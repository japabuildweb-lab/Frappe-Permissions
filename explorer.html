<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappe DocType Explorer</title>
    <meta name="description" content="Interactive visual explorer for Frappe/ERPNext DocType relationships">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: #16163a;
            --bg-hover: #1e1e4a;
            --border: #2a2a5a;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --text-muted: #5555777;
            --accent: #a855f7;
            --accent-light: #c084fc;
            --accent-dark: #7c3aed;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; height: 100vh; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
        #root { height: 100vh; }
        .shimmer { background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px var(--accent-glow); } 50% { box-shadow: 0 0 20px var(--accent-glow); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .slide-in-right { animation: slideInRight 0.3s ease-out; }
        .graph-bg { background-color: var(--bg-primary); background-image: radial-gradient(circle at 1px 1px, rgba(168,85,247,0.06) 1px, transparent 0); background-size: 30px 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ============== ICONS ==============
        const IconGraph = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="5" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><circle cx="19" cy="6" r="2"/><line x1="6.7" y1="7.5" x2="10.5" y2="16.5"/><line x1="17.3" y1="7.5" x2="13.5" y2="16.5"/><line x1="7" y1="6" x2="17" y2="6"/></svg>);
        const IconSearch = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>);
        const IconShield = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>);
        const IconLink = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>);
        const IconBox = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>);
        const IconTable = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>);
        const IconX = () => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);
        const IconZoomIn = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>);
        const IconZoomOut = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>);
        const IconMaximize = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>);
        const IconDownload = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
        const IconArrowIn = () => (<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>);
        const IconArrowOut = () => (<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>);
        const IconFilter = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>);
        const IconInfo = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>);

        // ============== MODULE COLOR MAP ==============
        const MODULE_COLORS = {
            'Accounts': '#f59e0b', 'Selling': '#22c55e', 'Buying': '#06b6d4', 'Stock': '#ef4444',
            'Manufacturing': '#f97316', 'HR': '#ec4899', 'Payroll': '#d946ef', 'Projects': '#8b5cf6',
            'CRM': '#3b82f6', 'Assets': '#14b8a6', 'Setup': '#64748b', 'Core': '#a855f7',
            'Website': '#06b6d4', 'ERPNext Integrations': '#f43f5e', 'Utilities': '#78716c',
            'Education': '#0ea5e9', 'Healthcare': '#10b981', 'Agriculture': '#84cc16',
            'Quality Management': '#6366f1', 'Support': '#f472b6', 'Loan Management': '#fbbf24',
            'Regional': '#94a3b8',
        };
        const getModuleColor = (mod) => MODULE_COLORS[mod] || '#' + ((Math.abs(hashStr(mod || '')) & 0xFFFFFF) | 0x404040).toString(16).padStart(6,'0');
        const hashStr = (s) => { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return h; };

        // ============== CSV UTILITY ==============
        const downloadCSV = (data, filename) => {
            if (!data.length) return;
            const keys = Object.keys(data[0]);
            const csv = [keys.join(','), ...data.map(r => keys.map(k => `"${String(r[k]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
        };

        // ============== MAIN APP ==============
        const App = () => {
            // --- Auth State ---
            const [url, setUrl] = useState(localStorage.getItem('frappe_url') || '');
            const [apiKey, setApiKey] = useState(localStorage.getItem('frappe_api_key') || '');
            const [apiSecret, setApiSecret] = useState(localStorage.getItem('frappe_api_secret') || '');
            const [useProxy, setUseProxy] = useState(localStorage.getItem('frappe_use_proxy') === 'true');
            const [remember, setRemember] = useState(localStorage.getItem('frappe_remember') === 'true');
            const [connected, setConnected] = useState(false);
            const [connectedUser, setConnectedUser] = useState('');
            const [connecting, setConnecting] = useState(false);
            const [error, setError] = useState('');

            // --- Data State ---
            const [doctypes, setDoctypes] = useState([]);
            const [links, setLinks] = useState([]);
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState('');

            // --- UI State ---
            const [selectedNode, setSelectedNode] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [moduleFilter, setModuleFilter] = useState('');
            const [highlightConnections, setHighlightConnections] = useState(true);
            const [showSidebar, setShowSidebar] = useState(true);

            // --- Stats ---
            const stats = useMemo(() => {
                const modules = [...new Set(doctypes.map(d => d.module))].filter(Boolean).sort();
                const singles = doctypes.filter(d => d.issingle).length;
                const tables = doctypes.filter(d => d.istable).length;
                return { total: doctypes.length, modules, singles, tables, links: links.length };
            }, [doctypes, links]);

            // --- Frappe Fetch ---
            const frappeFetch = useCallback(async (endpoint) => {
                const base = url.replace(/\/+$/, '');
                const target = `${base}${endpoint}`;
                const fetchUrl = useProxy ? `http://localhost:8080/${target}` : target;
                const res = await fetch(fetchUrl, {
                    headers: { 'Authorization': `token ${apiKey}:${apiSecret}`, 'Content-Type': 'application/json' },
                });
                if (!res.ok) throw new Error(`API Error: ${res.status} ${res.statusText}`);
                return res.json();
            }, [url, apiKey, apiSecret, useProxy]);

            // --- Connect ---
            const handleConnect = async () => {
                setConnecting(true); setError('');
                try {
                    const res = await frappeFetch('/api/method/frappe.auth.get_logged_user');
                    setConnectedUser(res.message || 'Connected');
                    setConnected(true);
                    if (remember) {
                        localStorage.setItem('frappe_url', url);
                        localStorage.setItem('frappe_api_key', apiKey);
                        localStorage.setItem('frappe_api_secret', apiSecret);
                        localStorage.setItem('frappe_use_proxy', useProxy);
                        localStorage.setItem('frappe_remember', 'true');
                    }
                } catch (e) { setError(e.message); }
                setConnecting(false);
            };

            const handleDisconnect = () => { setConnected(false); setConnectedUser(''); setDoctypes([]); setLinks([]); setSelectedNode(null); };

            // --- Auto-connect ---
            useEffect(() => { if (remember && url && apiKey && apiSecret && !connected) handleConnect(); }, []);

            // --- Load Data ---
            useEffect(() => {
                if (!connected) return;
                const loadData = async () => {
                    setLoading(true);
                    try {
                        setLoadingMsg('Fetching DocTypes...');
                        const dtRes = await frappeFetch('/api/resource/DocType?fields=["name","module","issingle","istable","is_virtual","description"]&limit_page_length=0');
                        const allDoctypes = (dtRes.data || []).map(d => ({ ...d, issingle: !!d.issingle, istable: !!d.istable, is_virtual: !!d.is_virtual }));
                        setDoctypes(allDoctypes);

                        setLoadingMsg('Fetching relationships...');
                        const lfRes = await frappeFetch('/api/resource/DocField?filters=[["fieldtype","in",["Link","Table","Table MultiSelect"]]]&fields=["parent","fieldname","label","options","fieldtype"]&limit_page_length=0');
                        const allLinks = (lfRes.data || []).filter(l => l.options && allDoctypes.some(d => d.name === l.options));
                        setLinks(allLinks);

                        setLoadingMsg('');
                    } catch (e) { setError('Error loading data: ' + e.message); }
                    setLoading(false);
                };
                loadData();
            }, [connected, frappeFetch]);

            // --- Filtered DocTypes for sidebar ---
            const filteredDoctypes = useMemo(() => {
                return doctypes.filter(d => {
                    if (moduleFilter && d.module !== moduleFilter) return false;
                    if (searchTerm && !d.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
                    return true;
                }).sort((a, b) => a.name.localeCompare(b.name));
            }, [doctypes, moduleFilter, searchTerm]);

            // --- Selected node details ---
            const nodeDetails = useMemo(() => {
                if (!selectedNode) return null;
                const dt = doctypes.find(d => d.name === selectedNode);
                if (!dt) return null;
                const outgoing = links.filter(l => l.parent === selectedNode).map(l => ({ field: l.fieldname, label: l.label, target: l.options, type: l.fieldtype }));
                const incoming = links.filter(l => l.options === selectedNode).map(l => ({ field: l.fieldname, label: l.label, source: l.parent, type: l.fieldtype }));
                return { ...dt, outgoing, incoming };
            }, [selectedNode, doctypes, links]);

            // --- AUTH SCREEN ---
            if (!connected) {
                return (
                    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--bg-primary)' }}>
                        {/* Header */}
                        <div style={{ height: 56, background: 'var(--bg-secondary)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', flexShrink: 0 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                <div style={{ width: 34, height: 34, borderRadius: 8, background: 'linear-gradient(135deg, var(--accent-dark), var(--accent))', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><IconGraph /></div>
                                <div>
                                    <div style={{ fontWeight: 700, fontSize: 15 }}>Frappe DocType Explorer</div>
                                    <div style={{ fontSize: 11, color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 4 }}>● Disconnected</div>
                                </div>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://frappe.yourdomain.com" style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 12px', borderRadius: 6, width: 220, fontSize: 12, outline: 'none' }} />
                                <input value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="API Key" type="password" style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 12px', borderRadius: 6, width: 120, fontSize: 12, outline: 'none' }} />
                                <input value={apiSecret} onChange={e => setApiSecret(e.target.value)} placeholder="API Secret" type="password" style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 12px', borderRadius: 6, width: 120, fontSize: 12, outline: 'none' }} />
                                <label style={{ fontSize: 11, color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                                    <input type="checkbox" checked={useProxy} onChange={e => setUseProxy(e.target.checked)} style={{ accentColor: 'var(--accent)' }} /> CORS Proxy
                                </label>
                                <label style={{ fontSize: 11, color: 'var(--accent-light)', display: 'flex', alignItems: 'center', gap: 4, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                                    <input type="checkbox" checked={remember} onChange={e => setRemember(e.target.checked)} style={{ accentColor: 'var(--accent)' }} /> Remember
                                </label>
                                <button onClick={handleConnect} disabled={connecting} style={{ background: 'linear-gradient(135deg, var(--accent-dark), var(--accent))', color: '#fff', border: 'none', padding: '6px 18px', borderRadius: 6, fontWeight: 600, fontSize: 13, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, opacity: connecting ? 0.7 : 1 }}>
                                    <IconShield /> {connecting ? 'Connecting...' : 'Connect'}
                                </button>
                            </div>
                        </div>
                        {/* Auth Body */}
                        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }} className="graph-bg">
                            <div className="fade-in" style={{ textAlign: 'center' }}>
                                <div style={{ width: 70, height: 70, borderRadius: '50%', background: 'var(--bg-card)', border: '2px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 20px', color: 'var(--accent-light)' }}><IconGraph /></div>
                                <h2 style={{ fontSize: 22, fontWeight: 700, marginBottom: 8 }}>Authentication Required</h2>
                                <p style={{ color: 'var(--text-secondary)', fontSize: 14, maxWidth: 400, margin: '0 auto 20px' }}>Provide your Frappe URL and API Credentials to explore DocType relationships.</p>
                                {error && <div style={{ background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', color: '#fca5a5', padding: '10px 16px', borderRadius: 8, fontSize: 13, maxWidth: 400, margin: '0 auto 16px' }}>{error}</div>}
                                <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 10, padding: 16, maxWidth: 400, margin: '0 auto', textAlign: 'left' }}>
                                    <div style={{ color: 'var(--info)', fontSize: 13, fontWeight: 600, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}><IconInfo /> How to get credentials</div>
                                    <ul style={{ color: 'var(--text-secondary)', fontSize: 13, paddingLeft: 18, lineHeight: 1.8 }}>
                                        <li>Go to Frappe/ERPNext</li><li>Open your User Profile</li><li>Settings {'>'} API Access {'>'} Generate Keys</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div style={{ height: 32, background: 'var(--bg-secondary)', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', fontSize: 11, color: 'var(--text-muted)' }}>
                            <span>Frappe DocType Explorer v1.0</span><span style={{ color: 'var(--accent)' }}>Grupo ATU Internal Tools</span>
                        </div>
                    </div>
                );
            }

            // --- MAIN CONNECTED VIEW ---
            return (
                <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--bg-primary)' }}>
                    {/* Header */}
                    <div style={{ height: 56, background: 'var(--bg-secondary)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px', flexShrink: 0 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                            <div style={{ width: 34, height: 34, borderRadius: 8, background: 'linear-gradient(135deg, var(--accent-dark), var(--accent))', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><IconGraph /></div>
                            <div>
                                <div style={{ fontWeight: 700, fontSize: 15 }}>Frappe DocType Explorer</div>
                                <div style={{ fontSize: 11, color: 'var(--success)', display: 'flex', alignItems: 'center', gap: 4 }}>● Connected as {connectedUser}</div>
                            </div>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                            {/* Stats pills */}
                            <div style={{ display: 'flex', gap: 6 }}>
                                {[{l:'DocTypes', v: stats.total, c:'var(--accent)'}, {l:'Modules', v: stats.modules.length, c:'var(--info)'}, {l:'Links', v: stats.links, c:'var(--success)'}].map(s => (
                                    <div key={s.l} style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 6, padding: '3px 10px', fontSize: 11 }}>
                                        <span style={{ color: 'var(--text-secondary)' }}>{s.l} </span><span style={{ color: s.c, fontWeight: 700 }}>{s.v}</span>
                                    </div>
                                ))}
                            </div>
                            <div style={{ background: 'var(--bg-card)', padding: '4px 10px', borderRadius: 6, fontSize: 12, color: 'var(--text-secondary)', border: '1px solid var(--border)' }}>{url.replace(/https?:\/\//, '')}</div>
                            <button onClick={handleDisconnect} style={{ background: 'var(--danger)', color: '#fff', border: 'none', padding: '5px 14px', borderRadius: 6, fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>Disconnect</button>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
                        {/* Sidebar */}
                        {showSidebar && (
                            <div style={{ width: 280, background: 'var(--bg-secondary)', borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
                                {/* Module filter */}
                                <div style={{ padding: 12, borderBottom: '1px solid var(--border)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
                                        <IconFilter />
                                        <select value={moduleFilter} onChange={e => setModuleFilter(e.target.value)} style={{ flex: 1, background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '5px 8px', borderRadius: 6, fontSize: 12, outline: 'none' }}>
                                            <option value="">All Modules ({stats.modules.length})</option>
                                            {stats.modules.map(m => <option key={m} value={m}>{m}</option>)}
                                        </select>
                                    </div>
                                    <div style={{ position: 'relative' }}>
                                        <div style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', color: 'var(--text-secondary)' }}><IconSearch /></div>
                                        <input value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search DocTypes..." style={{ width: '100%', background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 10px 6px 30px', borderRadius: 6, fontSize: 12, outline: 'none' }} />
                                    </div>
                                </div>
                                {/* DocType list */}
                                <div style={{ flex: 1, overflowY: 'auto', padding: '4px 0' }}>
                                    <div style={{ padding: '4px 12px', fontSize: 11, color: 'var(--text-secondary)', fontWeight: 600 }}>{filteredDoctypes.length} DocTypes</div>
                                    {filteredDoctypes.map(d => {
                                        const linkCount = links.filter(l => l.parent === d.name || l.options === d.name).length;
                                        return (
                                            <div key={d.name} onClick={() => setSelectedNode(d.name)}
                                                style={{ padding: '7px 12px', cursor: 'pointer', borderLeft: selectedNode === d.name ? '3px solid var(--accent)' : '3px solid transparent', background: selectedNode === d.name ? 'var(--bg-hover)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'space-between', transition: 'all 0.15s' }}
                                                onMouseEnter={e => { if (selectedNode !== d.name) e.currentTarget.style.background = 'var(--bg-card)'; }}
                                                onMouseLeave={e => { if (selectedNode !== d.name) e.currentTarget.style.background = 'transparent'; }}>
                                                <div style={{ minWidth: 0 }}>
                                                    <div style={{ fontSize: 12, fontWeight: selectedNode === d.name ? 600 : 400, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{d.name}</div>
                                                    <div style={{ fontSize: 10, color: getModuleColor(d.module), display: 'flex', alignItems: 'center', gap: 4 }}>
                                                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: getModuleColor(d.module), display: 'inline-block' }}></span>
                                                        {d.module || 'No Module'}
                                                        {d.istable && <span style={{ color: 'var(--warning)', marginLeft: 4 }}>⊞ child</span>}
                                                        {d.issingle && <span style={{ color: 'var(--info)', marginLeft: 4 }}>◉ single</span>}
                                                    </div>
                                                </div>
                                                {linkCount > 0 && <span style={{ fontSize: 10, color: 'var(--text-secondary)', background: 'var(--bg-card)', padding: '1px 6px', borderRadius: 10, fontWeight: 600 }}>{linkCount}</span>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* Graph Area */}
                        <div style={{ flex: 1, position: 'relative' }} className="graph-bg">
                            {loading ? (
                                <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
                                    <div style={{ width: 50, height: 50, borderRadius: '50%', border: '3px solid var(--border)', borderTopColor: 'var(--accent)', animation: 'spin 1s linear infinite' }}></div>
                                    <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                                    <div style={{ color: 'var(--text-secondary)', fontSize: 14 }}>{loadingMsg}</div>
                                </div>
                            ) : (
                                <GraphCanvas doctypes={filteredDoctypes} allDoctypes={doctypes} links={links} selectedNode={selectedNode} setSelectedNode={setSelectedNode} highlightConnections={highlightConnections} moduleFilter={moduleFilter} />
                            )}

                            {/* Graph controls */}
                            <div style={{ position: 'absolute', bottom: 16, left: showSidebar ? 16 : 16, display: 'flex', gap: 6 }}>
                                <button onClick={() => setShowSidebar(!showSidebar)} style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 10px', borderRadius: 6, cursor: 'pointer', fontSize: 12, display: 'flex', alignItems: 'center', gap: 4 }}>
                                    {showSidebar ? '◀ Hide' : '▶ Show'} Panel
                                </button>
                                <button onClick={() => setHighlightConnections(!highlightConnections)} style={{ background: highlightConnections ? 'var(--accent-dark)' : 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 10px', borderRadius: 6, cursor: 'pointer', fontSize: 12 }}>
                                    ✦ Highlight
                                </button>
                                <button onClick={() => {
                                    const csvData = links.map(l => ({ source: l.parent, field: l.fieldname, type: l.fieldtype, target: l.options }));
                                    downloadCSV(csvData, 'doctype_relationships.csv');
                                }} style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', color: 'var(--text-primary)', padding: '6px 10px', borderRadius: 6, cursor: 'pointer', fontSize: 12, display: 'flex', alignItems: 'center', gap: 4 }}>
                                    <IconDownload /> Export CSV
                                </button>
                            </div>
                        </div>

                        {/* Detail Panel */}
                        {nodeDetails && (
                            <div className="slide-in-right" style={{ width: 340, background: 'var(--bg-secondary)', borderLeft: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0, overflowY: 'auto' }}>
                                <div style={{ padding: 16, borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                    <div>
                                        <div style={{ fontSize: 16, fontWeight: 700 }}>{nodeDetails.name}</div>
                                        <div style={{ fontSize: 12, color: getModuleColor(nodeDetails.module), display: 'flex', alignItems: 'center', gap: 4, marginTop: 2 }}>
                                            <span style={{ width: 8, height: 8, borderRadius: '50%', background: getModuleColor(nodeDetails.module) }}></span>
                                            {nodeDetails.module || 'No Module'}
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedNode(null)} style={{ background: 'none', border: 'none', color: 'var(--text-secondary)', cursor: 'pointer', padding: 4 }}><IconX /></button>
                                </div>
                                {/* Tags */}
                                <div style={{ padding: '8px 16px', display: 'flex', gap: 6, flexWrap: 'wrap', borderBottom: '1px solid var(--border)' }}>
                                    {nodeDetails.istable && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 4, background: 'rgba(245,158,11,0.15)', color: 'var(--warning)', fontWeight: 600 }}>Child Table</span>}
                                    {nodeDetails.issingle && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 4, background: 'rgba(6,182,212,0.15)', color: 'var(--info)', fontWeight: 600 }}>Single</span>}
                                    {nodeDetails.is_virtual && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 4, background: 'rgba(168,85,247,0.15)', color: 'var(--accent-light)', fontWeight: 600 }}>Virtual</span>}
                                    {!nodeDetails.istable && !nodeDetails.issingle && <span style={{ fontSize: 11, padding: '2px 8px', borderRadius: 4, background: 'rgba(34,197,94,0.15)', color: 'var(--success)', fontWeight: 600 }}>Standard</span>}
                                </div>
                                {nodeDetails.description && <div style={{ padding: '8px 16px', fontSize: 12, color: 'var(--text-secondary)', borderBottom: '1px solid var(--border)', lineHeight: 1.5 }}>{nodeDetails.description}</div>}

                                {/* Outgoing Links */}
                                <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)' }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--accent-light)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                                        <IconArrowOut /> Links TO ({nodeDetails.outgoing.length})
                                    </div>
                                    {nodeDetails.outgoing.length === 0 ? (
                                        <div style={{ fontSize: 12, color: 'var(--text-secondary)', fontStyle: 'italic' }}>No outgoing links</div>
                                    ) : (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                                            {nodeDetails.outgoing.map((l, i) => (
                                                <div key={i} onClick={() => setSelectedNode(l.target)} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '5px 8px', background: 'var(--bg-card)', borderRadius: 6, cursor: 'pointer', transition: 'background 0.15s', fontSize: 12 }}
                                                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-hover)'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'var(--bg-card)'}>
                                                    <div>
                                                        <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>{l.target}</span>
                                                        <span style={{ color: 'var(--text-secondary)', marginLeft: 6 }}>via {l.field}</span>
                                                    </div>
                                                    <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: l.type === 'Link' ? 'rgba(168,85,247,0.2)' : 'rgba(245,158,11,0.2)', color: l.type === 'Link' ? 'var(--accent-light)' : 'var(--warning)' }}>{l.type === 'Table' ? '⊞' : '⟶'} {l.type}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                {/* Incoming Links */}
                                <div style={{ padding: '12px 16px' }}>
                                    <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--success)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>
                                        <IconArrowIn /> Links FROM ({nodeDetails.incoming.length})
                                    </div>
                                    {nodeDetails.incoming.length === 0 ? (
                                        <div style={{ fontSize: 12, color: 'var(--text-secondary)', fontStyle: 'italic' }}>No incoming links</div>
                                    ) : (
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                                            {nodeDetails.incoming.map((l, i) => (
                                                <div key={i} onClick={() => setSelectedNode(l.source)} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '5px 8px', background: 'var(--bg-card)', borderRadius: 6, cursor: 'pointer', transition: 'background 0.15s', fontSize: 12 }}
                                                    onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-hover)'}
                                                    onMouseLeave={e => e.currentTarget.style.background = 'var(--bg-card)'}>
                                                    <div>
                                                        <span style={{ fontWeight: 600, color: 'var(--text-primary)' }}>{l.source}</span>
                                                        <span style={{ color: 'var(--text-secondary)', marginLeft: 6 }}>via {l.field}</span>
                                                    </div>
                                                    <span style={{ fontSize: 10, padding: '1px 6px', borderRadius: 4, background: l.type === 'Link' ? 'rgba(168,85,247,0.2)' : 'rgba(245,158,11,0.2)', color: l.type === 'Link' ? 'var(--accent-light)' : 'var(--warning)' }}>{l.type === 'Table' ? '⊞' : '⟶'} {l.type}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div style={{ height: 28, background: 'var(--bg-secondary)', borderTop: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', fontSize: 11, color: 'var(--text-secondary)', flexShrink: 0 }}>
                        <span>Frappe DocType Explorer v1.0</span>
                        <span style={{ color: 'var(--accent)' }}>Grupo ATU Internal Tools</span>
                    </div>
                </div>
            );
        };

        // ============== D3 GRAPH COMPONENT ==============
        const GraphCanvas = ({ doctypes, allDoctypes, links, selectedNode, setSelectedNode, highlightConnections, moduleFilter }) => {
            const svgRef = useRef(null);
            const simulationRef = useRef(null);
            const zoomRef = useRef(null);

            useEffect(() => {
                if (!svgRef.current || doctypes.length === 0) return;

                const svg = d3.select(svgRef.current);
                svg.selectAll('*').remove();

                const container = svgRef.current.parentElement;
                const width = container.clientWidth;
                const height = container.clientHeight;

                svg.attr('width', width).attr('height', height);

                // Build graph data
                const nodeSet = new Set(doctypes.map(d => d.name));
                const filteredLinks = links.filter(l => nodeSet.has(l.parent) && nodeSet.has(l.options));

                // Count connections for node sizing
                const connCount = {};
                filteredLinks.forEach(l => {
                    connCount[l.parent] = (connCount[l.parent] || 0) + 1;
                    connCount[l.options] = (connCount[l.options] || 0) + 1;
                });

                const nodes = doctypes.map(d => ({
                    id: d.name,
                    module: d.module,
                    istable: d.istable,
                    issingle: d.issingle,
                    connections: connCount[d.name] || 0,
                }));

                const edgeData = [];
                const edgeSet = new Set();
                filteredLinks.forEach(l => {
                    const key = `${l.parent}|${l.options}`;
                    if (!edgeSet.has(key)) {
                        edgeSet.add(key);
                        edgeData.push({ source: l.parent, target: l.options, type: l.fieldtype });
                    }
                });

                // Zoom
                const g = svg.append('g');
                const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => g.attr('transform', e.transform));
                svg.call(zoom);
                zoomRef.current = zoom;

                // Arrowhead
                svg.append('defs').append('marker')
                    .attr('id', 'arrowhead').attr('viewBox', '0 -5 10 10').attr('refX', 20).attr('refY', 0)
                    .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
                    .append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'rgba(168,85,247,0.4)');

                // Links
                const link = g.append('g').selectAll('line').data(edgeData).join('line')
                    .attr('stroke', d => d.type === 'Table' ? 'rgba(245,158,11,0.25)' : 'rgba(168,85,247,0.2)')
                    .attr('stroke-width', 1)
                    .attr('marker-end', 'url(#arrowhead)');

                // Nodes
                const node = g.append('g').selectAll('g').data(nodes).join('g')
                    .style('cursor', 'pointer')
                    .call(d3.drag()
                        .on('start', (e, d) => { if (!e.active) simulationRef.current.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
                        .on('end', (e, d) => { if (!e.active) simulationRef.current.alphaTarget(0); d.fx = null; d.fy = null; })
                    );

                node.append('circle')
                    .attr('r', d => Math.max(4, Math.min(14, 4 + d.connections * 0.8)))
                    .attr('fill', d => getModuleColor(d.module))
                    .attr('stroke', 'rgba(255,255,255,0.15)')
                    .attr('stroke-width', 1)
                    .attr('opacity', 0.85);

                node.append('text')
                    .text(d => d.connections > 2 ? d.id : '')
                    .attr('dx', d => Math.max(4, Math.min(14, 4 + d.connections * 0.8)) + 4)
                    .attr('dy', 4)
                    .attr('fill', 'var(--text-secondary)')
                    .attr('font-size', 9)
                    .attr('font-family', 'Inter');

                // Click handling
                node.on('click', (e, d) => { e.stopPropagation(); setSelectedNode(d.id); });
                svg.on('click', () => setSelectedNode(null));

                // Hover highlight
                node.on('mouseenter', (e, d) => {
                    if (!highlightConnections) return;
                    const connectedIds = new Set();
                    connectedIds.add(d.id);
                    edgeData.forEach(l => {
                        if (l.source.id === d.id || l.source === d.id) connectedIds.add(typeof l.target === 'object' ? l.target.id : l.target);
                        if (l.target.id === d.id || l.target === d.id) connectedIds.add(typeof l.source === 'object' ? l.source.id : l.source);
                    });
                    node.select('circle').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.1);
                    node.select('text').attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.1);
                    link.attr('opacity', l => {
                        const sid = typeof l.source === 'object' ? l.source.id : l.source;
                        const tid = typeof l.target === 'object' ? l.target.id : l.target;
                        return (sid === d.id || tid === d.id) ? 1 : 0.05;
                    }).attr('stroke-width', l => {
                        const sid = typeof l.source === 'object' ? l.source.id : l.source;
                        const tid = typeof l.target === 'object' ? l.target.id : l.target;
                        return (sid === d.id || tid === d.id) ? 2 : 1;
                    });
                }).on('mouseleave', () => {
                    if (!highlightConnections) return;
                    node.select('circle').attr('opacity', 0.85);
                    node.select('text').attr('opacity', 1);
                    link.attr('opacity', 1).attr('stroke-width', 1);
                });

                // Simulation
                const simulation = d3.forceSimulation(nodes)
                    .force('link', d3.forceLink(edgeData).id(d => d.id).distance(80).strength(0.3))
                    .force('charge', d3.forceManyBody().strength(-120))
                    .force('center', d3.forceCenter(width / 2, height / 2))
                    .force('collision', d3.forceCollide().radius(d => Math.max(4, Math.min(14, 4 + d.connections * 0.8)) + 6))
                    .on('tick', () => {
                        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
                        node.attr('transform', d => `translate(${d.x},${d.y})`);
                    });

                simulationRef.current = simulation;

                // Initial zoom to fit
                setTimeout(() => {
                    svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.6).translate(-width / 2, -height / 2));
                }, 1000);

                return () => simulation.stop();
            }, [doctypes, links, highlightConnections, moduleFilter]);

            // Highlight selected node
            useEffect(() => {
                if (!svgRef.current) return;
                const svg = d3.select(svgRef.current);
                svg.selectAll('circle')
                    .attr('stroke', d => d && d.id === selectedNode ? '#fff' : 'rgba(255,255,255,0.15)')
                    .attr('stroke-width', d => d && d.id === selectedNode ? 3 : 1);
            }, [selectedNode]);

            return (
                <div style={{ width: '100%', height: '100%', position: 'relative' }}>
                    <svg ref={svgRef} style={{ width: '100%', height: '100%' }}></svg>
                    {/* Legend */}
                    <div style={{ position: 'absolute', top: 12, right: 12, background: 'rgba(17,17,40,0.9)', border: '1px solid var(--border)', borderRadius: 8, padding: 10, fontSize: 11 }}>
                        <div style={{ fontWeight: 700, marginBottom: 6, color: 'var(--text-secondary)' }}>Legend</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
                            <div style={{ width: 16, height: 2, background: 'var(--accent)', borderRadius: 1 }}></div>
                            <span style={{ color: 'var(--text-secondary)' }}>Link field</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
                            <div style={{ width: 16, height: 2, background: 'var(--warning)', borderRadius: 1 }}></div>
                            <span style={{ color: 'var(--text-secondary)' }}>Table / Child</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--text-secondary)' }}></div>
                            <span style={{ color: 'var(--text-secondary)' }}>Node = DocType (size = connections)</span>
                        </div>
                    </div>
                </div>
            );
        };

        // ============== RENDER ==============
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
