                                        <input type="text" placeholder="Filtrar usuarios (Nombre o Email)..." className="bg-surface2 border border-border text-sm rounded-lg px-3 py-2 flex-grow outline-none focus:border-accentSec" value={userSearch} onChange={e => setUserSearch(e.target.value)} />
                                        <div className="flex gap-2">
                                            <button onClick={selectAllFiltered} className="text-[10px] font-bold uppercase text-accent hover:underline">Todos filtered</button>
                                            <button onClick={() => setSelectedUsers([])} className="text-[10px] font-bold uppercase text-gray-500 hover:text-gray-300">Limpiar</button>
                                        </div>
                                    </div>
                                    <div className="flex-grow overflow-auto p-2 scroll-p-2">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                                            {filteredUsers.map(u => (
                                                <label key={u.name} className={`flex items-center gap-3 p-3 rounded-lg border transition-all cursor-pointer ${selectedUsers.includes(u.name) ? 'bg-accentSec/10 border-accentSec/50' : 'bg-surface border-border hover:border-gray-600'}`}>
                                                    <input type="checkbox" checked={selectedUsers.includes(u.name)} onChange={() => toggleUserSelection(u.name)} className="w-4 h-4 accent-accentSec" />
                                                    <div className="flex flex-col min-w-0">
                                                        <span className="text-xs font-bold text-gray-200 truncate">{u.name}</span>
                                                        {u.full_name && <span className="text-[10px] text-gray-500 truncate">{u.full_name}</span>}
                                                    </div>
                                                </label>
                                            ))}
                                            {filteredUsers.length === 0 && <div className="col-span-full py-12 text-center text-gray-600 font-mono italic">No se encontraron usuarios.</div>}
                                        </div>
                                    </div>
                                    <div className="p-2 border-t border-border bg-surface text-[10px] font-mono text-gray-500 flex justify-between">
                                        <span>Seleccionados: {selectedUsers.length}</span>
                                        <span>Total visible: {filteredUsers.length}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {message && (
                            <div className={`p-4 rounded-lg flex items-center gap-3 text-sm font-mono ${message.type === 'success' ? 'bg-permGreen/10 text-permGreen border border-permGreen/30' : 'bg-permRed/10 text-permRed border border-permRed/30'}`}>
                                {message.type === 'success' ? <IconCheck /> : <IconAlertCircle />}
                                {message.text}
                                <button onClick={() => setMessage(null)} className="ml-auto opacity-50 hover:opacity-100"><IconX /></button>
                            </div>
                        )}
                    </div>

                    {!isBulkMode && selectedUser && (
                        <div className="flex-grow flex flex-col min-h-0 bg-surface/40 rounded-xl border border-border overflow-hidden">
                            <div className="p-4 border-b border-border bg-surface/60 shrink-0">
                                <h4 className="text-sm font-bold text-gray-400 font-mono text-uppercase uppercase">ROLES ACTUALES DE {selectedUser}</h4>
                            </div>
                            <div className="flex-grow overflow-auto p-4">
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    {userRoles.map(role => (
                                        <div key={role} className="bg-surface2 border border-border px-4 py-3 rounded-lg flex justify-between items-center group hover:border-accent/40 transition-all">
                                            <span className="text-sm text-gray-200 truncate pr-2" title={role}>{role}</span>
                                            <button onClick={() => handleSingleRemoveRole(role)} className="text-gray-600 hover:text-permRed transition-colors opacity-0 group-hover:opacity-100 p-1" title="Eliminar Rol"><IconX /></button>
                                        </div>
                                    ))}
                                    {userRoles.length === 0 && !loading && <div className="col-span-full p-8 text-center text-gray-500 italic">Este usuario no tiene roles asignados.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // --- TAB 7: REPORT (Informe Ejecutivo) ---
        const ReportMode = ({ frappeFetch, rolesCache, setRolesCache, usersCache, setUsersCache, downloadCSV }) => {
            const [reportData, setReportData] = useState(null);
            const [loading, setLoading] = useState(false);
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);

            const generateReport = async () => {
                setLoading(true);
                try {
                    // 1. Parallel Fetching for speed
                    const [usersRes, rolesRes, hasRoleRes, permRes] = await Promise.all([
                        frappeFetch('/api/resource/User?fields=["name","enabled"]&limit_page_length=2000'),
                        frappeFetch('/api/resource/Role?fields=["name"]&limit_page_length=500'),
                        frappeFetch('/api/resource/Has Role?fields=["parent","role"]&limit_page_length=10000'),
                        frappeFetch('/api/resource/DocPerm?fields=["parent","role","delete"]&limit_page_length=5000')
                    ]);

                    const users = usersRes.data || [];
                    const allRoles = (rolesRes.data || []).map(r => r.name);
                    const hasRoles = hasRoleRes.data || [];
                    const perms = permRes.data || [];

                    // 2. Calculations
                    // Users per role
                    const usersByRole = {};
                    allRoles.forEach(r => usersByRole[r] = 0);
                    hasRoles.forEach(hr => {
                        if (usersByRole[hr.role] !== undefined) usersByRole[hr.role]++;
                    });

                    // Top permissive DocTypes (most roles with delete=1)
                    const dtDeleteCount = {};
                    perms.forEach(p => {
                        if (p.delete === 1) {
                            dtDeleteCount[p.parent] = (dtDeleteCount[p.parent] || 0) + 1;
                        }
                    });
                    const topPermissive = Object.entries(dtDeleteCount)
                        .sort((a,b) => b[1] - a[1])
                        .slice(0, 10);

                    // Over-permissioned users (most roles)
                    const userRoleCount = {};
                    hasRoles.forEach(hr => {
                        userRoleCount[hr.parent] = (userRoleCount[hr.parent] || 0) + 1;
                    });
                    const topUsers = Object.entries(userRoleCount)
                        .sort((a,b) => b[1] - a[1])
                        .slice(0, 10);

                    // Ghost roles
                    const ghostRoles = allRoles.filter(r => !usersByRole[r]);

                    // Security Score Initial 100
                    let score = 100;
                    const sysManagers = hasRoles.filter(hr => hr.role === 'System Manager').length;
                    if (sysManagers > 1) score -= (sysManagers - 1) * 5; // Penalty for too many admins
                    const massDeleteRoles = perms.filter(p => p.delete === 1).length;
                    score -= Math.min(20, Math.floor(massDeleteRoles / 50)); // Penalty for excessive delete perms
                    score -= Math.min(10, ghostRoles.length); // Penalty for clutter
                    score = Math.max(0, score);

                    setReportData({
                        totalUsers: users.length,
                        activeUsers: users.filter(u => u.enabled).length,
                        sysManagers,
                        ghostRoles: ghostRoles.length,
                        topPermissive,
                        topUsers,
                        usersByRole,
                        score
                    });

                } catch (e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => {
                generateReport();
            }, []);

            useEffect(() => {
                if (reportData && chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    
                    const ctx = chartRef.current.getContext('2d');
                    const sortedRoles = Object.entries(reportData.usersByRole)
                        .filter(r => r[1] > 0)
                        .sort((a,b) => b[1] - a[1])
                        .slice(0, 15);

                    chartInstance.current = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: sortedRoles.map(r => r[0]),
                            datasets: [{
                                label: 'Usuarios por Rol',
                                data: sortedRoles.map(r => r[1]),
                                backgroundColor: 'rgba(0, 212, 255, 0.2)',
                                borderColor: '#00d4ff',
                                borderWidth: 2,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, grid: { color: 'rgba(30, 45, 61, 0.5)' }, ticks: { color: '#9ca3af' } },
                                x: { grid: { display: false }, ticks: { color: '#9ca3af', font: { size: 10 } } }
                            }
                        }
                    });
                }
            }, [reportData]);

            const exportJson = () => {
                const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audit_report_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const copySummary = () => {
                const text = `RESUMEN EJECUTIVO DE SEGURIDAD (${new Date().toLocaleDateString()})
Security Health Score: ${reportData.score}/100
Usuarios Totales: ${reportData.totalUsers}
Administradores del Sistema: ${reportData.sysManagers}
Roles Fantasma: ${reportData.ghostRoles}
Rating: ${reportData.score > 80 ? 'EXCELENTE' : reportData.score > 50 ? 'REQUIERE MEJORA' : 'CRÍTICO'}`;
                navigator.clipboard.writeText(text);
                alert("Resumen copiado al portapapeles");
            };

            if (loading) return <div className="p-20 text-center font-mono text-accent animate-pulse">GENERANDO INFORME ESTRATÉGICO...</div>;
            if (!reportData) return null;

            return (
                <div className="h-full flex flex-col gap-6 min-h-0 overflow-auto pr-2">
                    {/* TOP SUMMARY */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div className="bg-surface1 p-6 rounded-xl border border-border flex flex-col items-center">
                            <div className="text-xs text-gray-500 uppercase font-bold mb-2">Security Score</div>
                            <div className={`text-5xl font-bold font-mono ${reportData.score > 70 ? 'text-permGreen' : reportData.score > 40 ? 'text-permAmber' : 'text-permRed'}`}>
                                {reportData.score}
                            </div>
                            <div className="text-[10px] text-gray-400 mt-2 font-mono">Health Index</div>
                        </div>
                        <div className="bg-surface1 p-6 rounded-xl border border-border">
                            <div className="text-xs text-gray-500 uppercase font-bold mb-1">Total Users</div>
                            <div className="text-3xl font-bold font-mono text-white">{reportData.totalUsers}</div>
                            <div className="text-[10px] text-permGreen mt-2 font-mono">{reportData.activeUsers} Enabled</div>
                        </div>
                        <div className="bg-surface1 p-6 rounded-xl border border-border">
                            <div className="text-xs text-gray-500 uppercase font-bold mb-1">System Managers</div>
                            <div className="text-3xl font-bold font-mono text-permAmber">{reportData.sysManagers}</div>
                            <div className="text-[10px] text-gray-400 mt-2 font-mono">Full Access Accounts</div>
                        </div>
                        <div className="bg-surface1 p-6 rounded-xl border border-border">
                            <div className="text-xs text-gray-500 uppercase font-bold mb-1">Ghost Roles</div>

                            <div className="text-[10px] text-gray-500 mt-2 font-mono">Unassigned roles</div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* CHART SECTION */}
                        <div className="bg-surface1 p-6 rounded-xl border border-border flex flex-col">
                            <h4 className="text-sm font-bold text-gray-400 mb-6 uppercase tracking-wider font-mono">Distribución de Usuarios por Rol</h4>

                        {/* RISKS SECTION */}
                        <div className="space-y-6">
                            <div className="bg-surface1 p-6 rounded-xl border border-border">
                                <h4 className="text-sm font-bold text-permAmber mb-4 uppercase tracking-wider font-mono flex items-center gap-2">
                                    <IconAlertCircle className="w-4 h-4" /> Riesgo: Over-Permission
                                </h4>
                                <div className="space-y-2">
                                    {reportData.topUsers.map(([user, count]) => (
                                        <div key={user} className="flex justify-between items-center text-xs p-2 bg-surface2 rounded border border-border/50">
                                            <span className="font-mono text-gray-300">{user}</span>

                            <div className="bg-surface1 p-6 rounded-xl border border-border">
                                <h4 className="text-sm font-bold text-permRed mb-4 uppercase tracking-wider font-mono flex items-center gap-2">
                                    <IconShield className="w-4 h-4" /> DocTypes más Permisivos
                                </h4>
                                <div className="space-y-2">
                                    {reportData.topPermissive.map(([dt, count]) => (
                                        <div key={dt} className="flex justify-between items-center text-xs p-2 bg-surface2 rounded border border-border/50">
                                            <span className="font-mono text-gray-300">{dt}</span>
                                            <span className="bg-permRed/10 text-permRed px-2 py-0.5 rounded font-bold">{count} Roles con Delete</span>

                            <IconDownload /> EXPORTAR JSON COMPLETO
                        </button>
                        <button onClick={copySummary} className="flex-grow flex items-center justify-center gap-2 bg-accentSec/10 hover:bg-accentSec/20 text-accentSec border border-accentSec/40 py-3 rounded-lg font-bold text-sm transition-all">
                            <IconCopy /> COPIAR RESUMEN PARA INFORME
                        </button>
                    </div>
                </div>
            );
        };

        // --- TAB 6: TIMELINE (Historial de Versiones) ---
        const TimelineMode = ({ frappeFetch, usersCache, setUsersCache }) => {
            const [selectedUser, setSelectedUser] = useState('');
            const [timeline, setTimeline] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (usersCache.length === 0) {
                    frappeFetch('/api/resource/User?fields=["name","full_name"]&filters=[["enabled","=",1]]&limit_page_length=1000')
                        .then(data => {
                            if (data && data.data) {
                                setUsersCache(data.data.sort((a, b) => a.name.localeCompare(b.name)));
                            }
                        }).catch(e => console.error(e));
                }
            }, []);

            const fetchTimeline = async (userId) => {
                if (!userId) return;
                setLoading(true);
                try {
                    // Fetch versions for this specific user
                    const data = await frappeFetch(`/api/resource/Version?filters=[["ref_doctype","=","User"],["docname","=","${userId}"]]&fields=["owner","creation","data"]&order_by=creation desc&limit_page_length=200`);
                    
                    if (data && data.data) {
                        const events = [];
                        data.data.forEach(v => {
                            try {
                                const payload = JSON.parse(v.data);
                                if (payload.row_changed) {
                                    // Try to find changes in 'roles'
                                    payload.row_changed.forEach(rc => {
                                        if (rc[0] === 'roles') {
                                            // Format: ["roles", row_id, { added: [], removed: [], changed: [] }]
                                            const details = rc[2];
                                            if (details.added) {
                                                details.added.forEach(roleRow => {
                                                    events.push({
                                                        type: 'added',
                                                        role: roleRow.role,
                                                        owner: v.owner,
                                                        timestamp: v.creation
                                                    });
                                                });
                                            }
                                            if (details.removed) {
                                                details.removed.forEach(roleRow => {
                                                    events.push({
                                                        type: 'removed',
                                                        role: roleRow.role,
                                                        owner: v.owner,
                                                        timestamp: v.creation
                                                    });
                                                });
                                            }
                                        }
                                    });
                                }
                            } catch (e) {
                                console.error("Error parsing version data", e);
                            }
                        });
                        setTimeline(events);
                    }
                } catch (e) { }
                setLoading(false);
            };

            useEffect(() => {
                if (selectedUser) fetchTimeline(selectedUser);
                else setTimeline([]);
            }, [selectedUser]);

            const isSuspicious = (timestamp) => {
                const date = new Date(timestamp);
                const day = date.getDay(); // 0 = Sunday, 6 = Saturday
                const hour = date.getHours();
                const isWeekend = (day === 0 || day === 6);
                const isOutOfHours = (hour >= 20 || hour < 8);
                return isWeekend || isOutOfHours;
            };

            return (
                <div className="h-full flex flex-col gap-4 min-h-0 max-w-4xl mx-auto w-full">
                    <div className="bg-surface1 p-4 rounded-lg border border-border shrink-0">
                        <select
                            className="bg-surface2 border border-border text-gray-200 text-sm rounded px-3 py-2 w-full focus:border-accent outline-none font-mono"
                            value={selectedUser} onChange={e => setSelectedUser(e.target.value)}
                        >
                            <option value="">-- Seleccionar Usuario para historial --</option>
                            {usersCache.map(u => <option key={u.name} value={u.name}>{u.name} {u.full_name ? `(${u.full_name})` : ''}</option>)}
                        </select>
                    </div>

                    <div className="flex-grow overflow-auto relative pr-2">
                        {loading ? (
                            <div className="text-center p-12 text-gray-500 font-mono animate-pulse">Escaneando historial de auditoría...</div>
                        ) : timeline.length > 0 ? (
                            <div className="space-y-6 relative ml-6 border-l-2 border-border/50 py-4">
                                {timeline.map((ev, i) => {
                                    const suspicious = isSuspicious(ev.timestamp);
                                    return (
                                        <div key={i} className="relative pl-8">
                                            {/* Dot */}
                                            <div className={`absolute -left-[11px] top-1 w-5 h-5 rounded-full border-4 border-surface ${ev.type === 'added' ? 'bg-permGreen shadow-[0_0_8px_rgba(0,255,157,0.4)]' : 'bg-permRed shadow-[0_0_8px_rgba(255,77,106,0.4)]'}`}></div>
                                            
                                            <div className={`bg-surface1 p-5 rounded-xl border ${suspicious ? 'border-permRed/50 shadow-[0_0_15px_rgba(255,77,106,0.1)]' : 'border-border'} group transition-all hover:bg-surface2`}>
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className={`px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-widest ${ev.type === 'added' ? 'bg-permGreen/10 text-permGreen' : 'bg-permRed/10 text-permRed'}`}>
                                                        ROLE {ev.type === 'added' ? 'GRANTED' : 'REVOKED'}
                                                    </div>
                                                    <div className="text-xs text-gray-500 font-mono">
                                                        {ev.timestamp}
                                                    </div>
                                                </div>

                                                <h4 className="text-lg font-bold text-gray-200 mb-2 font-sans">{ev.role}</h4>
                                                
                                                <div className="flex items-center gap-2 text-xs text-gray-400 font-mono">
                                                    <IconUser className="w-3 h-3" />
                                                    <span>Action by: <span className="text-accent">{ev.owner}</span></span>
                                                </div>

                                                {suspicious && (
                                                    <div className="mt-3 flex items-center gap-2 text-permRed font-bold text-[10px] uppercase bg-permRed/10 p-2 rounded border border-permRed/20">
                                                        <IconAlertCircle className="w-4 h-4" />
                                                        <span>Alerta: Acceso detectado fuera de horario laboral</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : selectedUser ? (
                            <div className="text-center p-12 text-gray-500 italic">No se encontraron cambios registrados en los roles de este usuario.</div>
                        ) : (
                            <div className="text-center p-12 text-gray-500 italic">Selecciona un usuario para analizar su línea de tiempo.</div>
                        )}
                    </div>
                </div>
            );
        };

        // --- TAB 8: AUDIT (Auditoría de Riesgos) ---
        const AuditMode = ({ frappeFetch, usersCache, setUsersCache, rolesCache, setRolesCache, downloadCSV }) => {
            const [risks, setRisks] = useState({ redundantAdmins: [], sensitiveDeleters: [], duplicateRoles: [], userPermissions: [] });
            const [loading, setLoading] = useState(false);

            const runAudit = async () => {
                setLoading(true);
                try {
                    // 1. Fetch data
                    const [hasRolesRes, permRes, upRes] = await Promise.all([
                        frappeFetch('/api/resource/Has Role?fields=["parent","role"]&limit_page_length=10000'),
                        frappeFetch('/api/resource/DocPerm?fields=["parent","role","delete"]&limit_page_length=5000'),
                        frappeFetch('/api/resource/User%20Permission?fields=["user","allow","for_value","is_default"]&limit_page_length=5000')
                    ]);

                    const hasRoles = hasRolesRes.data || [];
                    const perms = permRes.data || [];
                    const userPermissions = upRes.data || [];

                    // 2. Scan: Redundant Admins
                    const roleMap = {}; // userId -> roles[]
                    hasRoles.forEach(hr => {
                        if (!roleMap[hr.parent]) roleMap[hr.parent] = [];
                        roleMap[hr.parent].push(hr.role);
                    });

                    const redundantAdmins = Object.keys(roleMap).filter(userId => {
                        const r = roleMap[userId];
                        return r.includes('Administrator') && r.includes('System Manager');
                    });

                    // 3. Scan: Sensitive Deleters
                    const rolesWithSensitiveDelete = perms
                        .filter(p => p.delete === 1 && SENSITIVE_DOCTYPES.includes(p.parent))
                        .map(p => ({ role: p.role, doctype: p.parent }));
                    
                    const sensitiveRoleList = [...new Set(rolesWithSensitiveDelete.map(r => r.role))];
                    const sensitiveDeleters = [];
                    Object.keys(roleMap).forEach(userId => {
                        const roles = roleMap[userId];
                        const dangerousRoles = roles.filter(r => sensitiveRoleList.includes(r));
                        if (dangerousRoles.length > 0) {
                            const affectedDts = rolesWithSensitiveDelete
                                .filter(r => dangerousRoles.includes(r.role))
                                .map(r => r.doctype);
                            sensitiveDeleters.push({ 
                                user: userId, 
                                roles: dangerousRoles.join(", "), 
                                doctypes: [...new Set(affectedDts)].join(", ")
                            });
                        }
                    });

                    // 4. Scan: Duplicate Roles
                    const permByRole = {};
                    perms.forEach(p => {
                        if (!permByRole[p.role]) permByRole[p.role] = [];
                        permByRole[p.role].push(`${p.parent}|${p.delete}`);
                    });
                    const signatures = {};
                    Object.keys(permByRole).forEach(role => {
                        const sig = permByRole[role].sort().join(',');
                        if (!signatures[sig]) signatures[sig] = [];
                        signatures[sig].push(role);
                    });
                    const duplicateRoles = Object.values(signatures).filter(list => list.length > 1);

                    setRisks({ redundantAdmins, sensitiveDeleters, duplicateRoles, userPermissions });
                } catch (e) {
                    console.error("Audit failed", e);
                }
                setLoading(false);
            };

            useEffect(() => { runAudit(); }, []);

            if (loading) return <div className="p-20 text-center font-mono text-accent animate-pulse uppercase">Corriendo heurística de seguridad...</div>;

            return (
                <div className="h-full flex flex-col gap-6 min-h-0 overflow-auto pr-2">
                    <div className="bg-surface1 p-6 rounded-xl border border-border flex justify-between items-center">
                        <div>
                            <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-2">
                                <IconActivity className="text-accent" /> Security Health Audit
                            </h3>
                            <p className="text-gray-500 text-sm">Escaneo automático de riesgos y gestión de User Permissions (Filtros de Registro).</p>
                        </div>
                        <button onClick={() => downloadCSV(risks.sensitiveDeleters, 'riesgos_borrado_frappe')} className="bg-surface2 border border-border text-gray-400 hover:text-white px-4 py-2 rounded-lg flex items-center gap-2 text-xs transition-all">
                            <IconDownload /> EXPORTAR RIESGOS
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* CRITICAL: SENSITIVE DELETION */}
                        <div className="bg-surface1 p-6 rounded-xl border border-permRed/30 space-y-4 flex flex-col shadow-[0_0_20px_rgba(255,77,106,0.05)]">
                            <h4 className="text-permRed font-bold uppercase text-xs tracking-widest flex items-center gap-2">
                                <IconAlertCircle className="w-4 h-4" /> Riesgo Crítico: Capacidad de Borrado
                            </h4>
                            <div className="flex-grow space-y-2 max-h-[400px] overflow-auto">
                                {risks.sensitiveDeleters.map((d, i) => (
                                    <div key={i} className="bg-surface2 p-3 rounded-lg border border-border group">
                                        <div className="font-mono text-xs text-gray-200 font-bold mb-1 truncate">{d.user}</div>
                                        <div className="text-[9px] text-gray-500 mb-2">Roles: {d.roles}</div>
                                        <div className="flex flex-wrap gap-1">
                                            {d.doctypes.split(", ").map(dt => <span key={dt} className="text-[9px] bg-permRed/10 text-permRed border border-permRed/20 px-1 rounded">{dt}</span>)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-6">
                            {/* USER PERMISSIONS (NEW FEATURE) */}
                            <div className="bg-surface1 p-6 rounded-xl border border-accent/30 space-y-4 shadow-[0_0_20px_rgba(0,212,255,0.05)]">
                                <h4 className="text-white font-bold uppercase text-xs tracking-widest flex items-center gap-2">
                                    <IconLock className="w-4 h-4 text-accent" /> User Permissions (Filtros de Registro)
                                </h4>
                                <div className="space-y-2 max-h-[250px] overflow-auto">
                                    {risks.userPermissions.slice(0, 50).map((up, i) => (
                                        <div key={i} className="text-[10px] p-2 bg-surface2 rounded border border-border grid grid-cols-3 gap-2">
                                            <span className="text-gray-400 truncate">{up.user}</span>
                                            <span className="text-accent font-bold">{up.allow}</span>
                                            <span className="text-gray-200 truncate">{up.for_value}</span>
                                        </div>
                                    ))}
                                    {risks.userPermissions.length === 0 && <div className="text-center py-4 text-gray-600 italic text-sm">Sin reglas de restricción.</div>}
                                </div>
                                {risks.userPermissions.length > 0 && <button onClick={() => downloadCSV(risks.userPermissions, 'user_permissions_frappe')} className="w-full text-[10px] text-gray-500 hover:text-white uppercase font-bold py-2 border-t border-border mt-2">Exportar todas las reglas ({risks.userPermissions.length})</button>}
                            </div>

                            {/* WARNING: REDUNDANT ADMINS */}
                            <div className="bg-surface1 p-6 rounded-xl border border-permAmber/30 space-y-4">
                                <h4 className="text-permAmber font-bold uppercase text-xs tracking-widest flex items-center gap-2">
                                    <IconShield className="w-4 h-4" /> Administradores Redundantes
                                </h4>
                                <div className="space-y-2 max-h-[100px] overflow-auto">
                                    {risks.redundantAdmins.map(u => (
                                        <div key={u} className="flex justify-between items-center text-xs p-2 bg-surface2 rounded border border-border">
                                            <span className="font-mono text-gray-300">{u}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- TAB 9: COMPARE (Comparador de Usuarios) ---
        const CompareMode = ({ frappeFetch, usersCache, setUsersCache, rolesCache, setRolesCache }) => {
            const [userA, setUserA] = useState('');
            const [userB, setUserB] = useState('');
            const [dataA, setDataA] = useState({ roles: [], perms: [] });
            const [dataB, setDataB] = useState({ roles: [], perms: [] });
            const [loading, setLoading] = useState(false);

            const fetchUserData = async (userId, target) => {
                if (!userId) return;
                try {
                    const res = await frappeFetch(`/api/resource/User/${userId}`);
                    const roles = res.data.roles.map(r => r.role);
                    
                    // Fetch nested perms for these roles
                    const permRes = await frappeFetch(`/api/resource/DocPerm?fields=["parent","role","read","write","create","delete"]&filters=[["role","in",${JSON.stringify(roles)}]]&limit_page_length=2000`);
                    const perms = permRes.data || [];
                    
                    if (target === 'A') setDataA({ roles, perms });
                    else setDataB({ roles, perms });
                } catch (e) { }
            };

            useEffect(() => { 
                const init = async () => {
                    setLoading(true);
                    await Promise.all([fetchUserData(userA, 'A'), fetchUserData(userB, 'B')]);
                    setLoading(false);
                };
                if (userA || userB) init();
            }, [userA, userB]);

            const allDocTypes = [...new Set([...dataA.perms.map(p => p.parent), ...dataB.perms.map(p => p.parent)])].sort();

            return (
                <div className="h-full flex flex-col gap-6 min-h-0">
                    <div className="bg-surface1 p-6 rounded-xl border border-border flex items-center gap-6">
                        <div className="flex-grow">
                            <label className="text-[10px] text-gray-500 uppercase font-bold block mb-2 tracking-tighter">Usuario Origen</label>
                            <select className="w-full bg-surface2 border border-border rounded-lg px-4 py-2.5 text-sm focus:border-accent" value={userA} onChange={e => setUserA(e.target.value)}>
                                <option value="">Seleccionar...</option>
                                {usersCache.map(u => <option key={u.name} value={u.name}>{u.full_name || u.name}</option>)}
                            </select>
                        </div>
                        <div className="text-accent"><IconArrowsExpand className="w-6 h-6" /></div>
                        <div className="flex-grow">
                            <label className="text-[10px] text-gray-500 uppercase font-bold block mb-2 tracking-tighter">Usuario Comparado</label>
                            <select className="w-full bg-surface2 border border-border rounded-lg px-4 py-2.5 text-sm focus:border-accent" value={userB} onChange={e => setUserB(e.target.value)}>
                                <option value="">Seleccionar...</option>
                                {usersCache.map(u => <option key={u.name} value={u.name}>{u.full_name || u.name}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="flex-grow overflow-auto grid grid-cols-2 gap-6 pr-2">
                        {/* SIDE A */}
                        <div className="space-y-6">
                            <div className="bg-surface1 p-4 rounded-xl border border-border">
                                <h4 className="text-xs font-bold text-gray-400 uppercase mb-4">Roles de {userA || '...'}</h4>
                                <div className="flex flex-wrap gap-2">
                                    {dataA.roles.map(r => (
                                        <span key={r} className={`text-[10px] px-2 py-1 rounded border font-bold ${dataB.roles.includes(r) ? 'bg-surface2 border-border text-gray-400' : 'bg-permGreen/10 border-permGreen/30 text-permGreen'}`}>
                                            {r} {!dataB.roles.includes(r) && ' (Único)'}
                                        </span>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-surface1 rounded-xl border border-border overflow-hidden">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-surface2 text-[9px] text-gray-500 sticky top-0">
                                        <tr><th className="p-3">DocType</th><th className="p-3">R</th><th className="p-3">W</th><th className="p-3">C</th><th className="p-3">D</th></tr>
                                    </thead>
                                    <tbody className="text-[10px]">
                                        {allDocTypes.map(dt => {
                                            const pA = dataA.perms.find(p => p.parent === dt && (p.read || p.write || p.create || p.delete));
                                            const pB = dataB.perms.find(p => p.parent === dt && (p.read || p.write || p.create || p.delete));
                                            if (!pA) return null;
                                            const isDiff = !pB || pA.read !== pB.read || pA.write !== pB.write || pA.create !== pB.create || pA.delete !== pB.delete;
                                            return (
                                                <tr key={dt} className={`border-t border-border/50 ${isDiff ? 'bg-permGreen/5' : ''}`}>
                                                    <td className="p-3 font-mono text-gray-300">{dt}</td>
                                                    <td className="p-3">{pA.read ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pA.write ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pA.create ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pA.delete ? '✅' : '❌'}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* SIDE B */}
                        <div className="space-y-6">
                            <div className="bg-surface1 p-4 rounded-xl border border-border">
                                <h4 className="text-xs font-bold text-gray-400 uppercase mb-4">Roles de {userB || '...'}</h4>
                                <div className="flex flex-wrap gap-2">
                                    {dataB.roles.map(r => (
                                        <span key={r} className={`text-[10px] px-2 py-1 rounded border font-bold ${dataA.roles.includes(r) ? 'bg-surface2 border-border text-gray-400' : 'bg-permAmber/10 border-permAmber/30 text-permAmber'}`}>
                                            {r} {!dataA.roles.includes(r) && ' (Único)'}
                                        </span>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-surface1 rounded-xl border border-border overflow-hidden">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-surface2 text-[9px] text-gray-500 sticky top-0">
                                        <tr><th className="p-3">DocType</th><th className="p-3">R</th><th className="p-3">W</th><th className="p-3">C</th><th className="p-3">D</th></tr>
                                    </thead>
                                    <tbody className="text-[10px]">
                                        {allDocTypes.map(dt => {
                                            const pA = dataA.perms.find(p => p.parent === dt && (p.read || p.write || p.create || p.delete));
                                            const pB = dataB.perms.find(p => p.parent === dt && (p.read || p.write || p.create || p.delete));
                                            if (!pB) return null;
                                            const isDiff = !pA || pA.read !== pB.read || pA.write !== pB.write || pA.create !== pB.create || pA.delete !== pB.delete;
                                            return (
                                                <tr key={dt} className={`border-t border-border/50 ${isDiff ? 'bg-permAmber/5' : ''}`}>
                                                    <td className="p-3 font-mono text-gray-300">{dt}</td>
                                                    <td className="p-3">{pB.read ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pB.write ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pB.create ? '✅' : '❌'}</td>
                                                    <td className="p-3">{pB.delete ? '✅' : '❌'}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
