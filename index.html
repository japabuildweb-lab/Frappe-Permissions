<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frappe Permission Auditor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {

                        base: '#080b0f',
                        surface: '#0d1117',
                        surface1: '#111827',
                        surface2: '#161d2b',
                        border: '#1e2d3d',
                        accent: '#00d4ff',
                        permGreen: '#00ff9d',
                        permRed: '#ff4d6a',
                        permAmber: '#ffb800',
                        accentSec: '#9d7aff',
                    },
                    fontFamily: {
                        sans: ['Syne', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700&display=swap');

        body {
            background-color: #080b0f;
            color: #e5e7eb;
            font-family: 'Syne', sans-serif;
            background-image:
                linear-gradient(rgba(30, 45, 61, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 45, 61, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e2d3d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        .scan-line {
            position: relative;
            overflow: hidden;
        }

        .scan-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            100% {
                left: 200%;
            }
        }

        .shimmer {
            background: linear-gradient(90deg, #00d4ff 0%, #9d7aff 50%, #00d4ff 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }
    </style>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="text-gray-200 min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- Icons ---
        const IconCheck = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>;
        const IconX = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg>;
        const IconServer = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" /></svg>;
        const IconAlertCircle = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconShield = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>;
        const IconUser = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>;
        const IconDatabase = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg>;
        const IconUsers = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>;
        const IconUserPlus = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>;
        const IconClock = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>;
        const IconLock = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>;
        const IconDownload = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>;
        const IconCopy = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2" /></svg>;
        const IconActivity = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>;
        const IconChartPie = () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>;
        const IconArrowsExpand = () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>;

        const SENSITIVE_DOCTYPES = ["Sales Invoice", "Journal Entry", "Payment Entry", "User", "Role", "DocPerm", "Bank Account", "Salary Slip", "Employee", "Customer", "Supplier"];
        const PERMISSIONS = ["read", "write", "create", "delete", "submit", "cancel", "amend", "report", "export", "import", "share", "print", "email"];

        const downloadCSV = (data, filename) => {
            if (!data || !data.length) return;
            const headers = Object.keys(data[0]).join(",");
            const rows = data.map(obj => Object.values(obj).map(val => `"${val}"`).join(",")).join("\n");
            const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows;
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `${filename}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        const App = () => {
            // Connection State
            const [url, setUrl] = useState(localStorage.getItem('frappe_url') || '');
            const [apiKey, setApiKey] = useState(localStorage.getItem('frappe_api_key') || '');
            const [apiSecret, setApiSecret] = useState(localStorage.getItem('frappe_api_secret') || '');
            const [useProxy, setUseProxy] = useState(localStorage.getItem('frappe_use_proxy') === 'true');
            const [rememberMe, setRememberMe] = useState(true);

            const [connected, setConnected] = useState(false);
            const [loggedUser, setLoggedUser] = useState(null);

            const [globalLoading, setGlobalLoading] = useState(false);
            const [globalError, setGlobalError] = useState(null);

            // Tab State
            const [activeTab, setActiveTab] = useState('role'); // role, user, doctype

            // Shared Cache
            const [rolesCache, setRolesCache] = useState([]);
            const [usersCache, setUsersCache] = useState([]);
            const [docTypesCache, setDocTypesCache] = useState([]);

            // Helper to make API calls
            const frappeFetch = async (endpoint, options = {}) => {
                setGlobalError(null);
                setGlobalLoading(true);
                try {
                    const baseUrl = url.replace(/\/$/, "");
                    const targetUrl = `${baseUrl}${endpoint}`;

                    // CORS-anywhere proxy format (puerto 8080)
                    const fetchUrl = useProxy
                        ? `http://localhost:8080/${targetUrl}`
                        : targetUrl;

                    const headers = {
                        'Authorization': `token ${apiKey}:${apiSecret}`,
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        ...(options.headers || {})
                    };

                    const res = await fetch(fetchUrl, { ...options, headers });
                    if (!res.ok) {
                        let errMsg = res.statusText;
                        try {
                            const errData = await res.json();
                            if (errData.exc_type) errMsg = errData.exc_type;
                            if (errData._server_messages) {
                                const msgs = JSON.parse(errData._server_messages);
                                errMsg = JSON.parse(msgs[0]).message;
                            }
                        } catch (e) { }
                        throw new Error(`Error ${res.status}: ${errMsg}`);
                    }
                    const data = await res.json();
                    setGlobalLoading(false);
                    return data;
                } catch (err) {
                    setGlobalLoading(false);
                    setGlobalError(err.message);
                    throw err;
                }
            };

            const handleConnect = async (e) => {
                if (e) e.preventDefault();
                if (!url || !apiKey || !apiSecret) {
                    setGlobalError("All connection fields are required");
                    return;
                }
                try {
                    const data = await frappeFetch('/api/method/frappe.auth.get_logged_user');
                    if (data.message) {
                        setLoggedUser(data.message);
                        setConnected(true);
                        setGlobalError(null);

                        // Save credentials if Remembered
                        if (rememberMe) {
                            localStorage.setItem('frappe_url', url);
                            localStorage.setItem('frappe_api_key', apiKey);
                            localStorage.setItem('frappe_api_secret', apiSecret);
                            localStorage.setItem('frappe_use_proxy', useProxy);
                        } else {
                            localStorage.removeItem('frappe_url');
                            localStorage.removeItem('frappe_api_key');
                            localStorage.removeItem('frappe_api_secret');
                            localStorage.removeItem('frappe_use_proxy');
                        }
                    }
                } catch (err) {
                    setConnected(false);
                    setLoggedUser(null);
                }
            };

            const handleDisconnect = () => {
                setConnected(false);
                setLoggedUser(null);
                setRolesCache([]);
                setUsersCache([]);
                setDocTypesCache([]);
                setGlobalError(null);
            };

            // Auto-connect if credentials found
            useEffect(() => {
                if (url && apiKey && apiSecret && !connected) {
                    handleConnect();
                }
            }, []);

            return (
                <div className="flex flex-col h-screen">
                    {globalLoading && <div className="h-1 w-full absolute top-0 left-0 shimmer z-50"></div>}

                    {/* HEADER / CONNECTION PANEL */}
                    <header className={`border-b border-border bg-surface ${globalLoading ? 'scan-line' : ''} shrink-0`}>
                        <div className="container mx-auto px-4 py-4">
                            <div className="flex flex-col lg:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-accent/10 p-2 rounded-lg border border-accent/20">
                                        <IconShield />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                            Frappe Permission Auditor
                                        </h1>
                                        <div className="flex items-center gap-2 text-sm mt-1">
                                            <div className={`w-2 h-2 rounded-full ${connected ? 'bg-permGreen animate-pulse shadow-[0_0_8px_rgba(0,255,157,0.5)]' : 'bg-permRed'}`}></div>
                                            <span className={connected ? 'text-permGreen' : 'text-gray-400'}>
                                                {connected ? `Connected as ${loggedUser}` : 'Disconnected'}
                                            </span>
                                        </div>
                                    </div>
                                </div>

                                {!connected ? (
                                    <form onSubmit={handleConnect} className="flex flex-wrap items-center gap-2">
                                        <input type="text" placeholder="https://frappe.yourdomain.com"
                                            className="bg-surface1 border border-border text-sm rounded px-3 py-1.5 focus:outline-none focus:border-accent text-gray-200 font-mono w-64"
                                            value={url} onChange={e => setUrl(e.target.value)} />
                                        <input type="password" placeholder="API Key"
                                            className="bg-surface1 border border-border text-sm rounded px-3 py-1.5 focus:outline-none focus:border-accent text-gray-200 font-mono w-32"
                                            value={apiKey} onChange={e => setApiKey(e.target.value)} />
                                        <input type="password" placeholder="API Secret"
                                            className="bg-surface1 border border-border text-sm rounded px-3 py-1.5 focus:outline-none focus:border-accent text-gray-200 font-mono w-32"
                                            value={apiSecret} onChange={e => setApiSecret(e.target.value)} />
                                        <div className="flex flex-col gap-1 mx-2">
                                            <label className="flex items-center gap-2 text-[10px] text-gray-400 cursor-pointer hover:text-gray-200 transition-colors">
                                                <input type="checkbox" checked={useProxy} onChange={e => setUseProxy(e.target.checked)} className="accent-accent" />
                                                CORS Proxy
                                            </label>
                                            <label className="flex items-center gap-2 text-[10px] text-accent cursor-pointer hover:text-accent/80 transition-colors font-bold">
                                                <input type="checkbox" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} className="accent-accent" />
                                                Remember
                                            </label>
                                        </div>
                                        <button type="submit" className="bg-accent/10 hover:bg-accent/20 text-accent border border-accent/50 text-sm px-4 py-1.5 rounded transition-all font-semibold flex items-center gap-2" disabled={globalLoading}>
                                            <IconServer /> Connect
                                        </button>
                                    </form>
                                ) : (
                                    <div className="flex items-center gap-4 text-sm font-mono">
                                        <span className="text-gray-400 bg-surface1 px-3 py-1 rounded border border-border">{url}</span>
                                        <button onClick={handleDisconnect} className="bg-permRed/10 hover:bg-permRed/20 text-permRed border border-permRed/50 px-3 py-1 rounded transition-all">
                                            Disconnect
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ERROR NOTIFICATION */}
                    {globalError && (
                        <div className="bg-permRed/10 border-l-4 border-permRed text-permRed p-4 mx-4 mt-4 rounded flex items-start gap-3 shadow-lg shrink-0">
                            <IconAlertCircle />
                            <div className="font-mono text-sm break-all">{globalError}</div>
                            <button className="ml-auto opacity-50 hover:opacity-100" onClick={() => setGlobalError(null)}>
                                <IconX />
                            </button>
                        </div>
                    )}

                    {/* MAIN CONTENT */}
                    <main className="flex-grow container mx-auto px-4 py-6 flex flex-col min-h-0">
                        {!connected ? (
                            <div className="flex-grow flex items-center justify-center">
                                <div className="text-center space-y-4 max-w-md">
                                    <div className="w-20 h-20 bg-surface1 rounded-full border border-border flex items-center justify-center mx-auto shadow-[0_0_30px_rgba(0,212,255,0.05)]">
                                        <IconShield className="w-10 h-10 text-gray-500" />
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-300">Authentication Required</h2>
                                    <p className="text-gray-500">Provide your Frappe URL and API Credentials to begin auditing permissions.</p>

                                    <div className="bg-surface1 p-4 rounded text-left border border-border mt-6 text-sm">
                                        <h3 className="text-accent mb-2 font-mono flex items-center gap-2"><IconAlertCircle /> How to get credentials</h3>
                                        <ul className="text-gray-400 list-disc list-inside space-y-1">
                                            <li>Go to Frappe/ERPNext</li>
                                            <li>Open your User Profile</li>
                                            <li>Settings > API Access > Generate Keys</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col h-full min-h-0">
                                {/* TABS */}
                                <div className="flex border-b border-border shrink-0">
                                    {[
                                        { id: 'role', label: 'MODO ROL', icon: <IconShield /> },
                                        { id: 'user', label: 'MODO USUARIO', icon: <IconUser /> },
                                        { id: 'audit', label: 'AUDITORÍA RIESGOS', icon: <IconActivity /> },
                                        { id: 'compare', label: 'COMPARADOR', icon: <IconArrowsExpand /> },
                                        { id: 'reverse', label: 'MATRIZ INVERSA', icon: <IconUsers /> },
                                        { id: 'manage', label: 'GESTIÓN DE ROLES', icon: <IconUserPlus /> },
                                        { id: 'timeline', label: 'HISTORIAL', icon: <IconClock /> },
                                        { id: 'report', label: 'INFORME', icon: <IconChartPie /> },
                                        { id: 'doctype', label: 'MODO DOCTYPE', icon: <IconDatabase /> }
                                    ].map(t => (
                                        <button
                                            key={t.id}
                                            onClick={() => setActiveTab(t.id)}
                                            className={`flex items-center gap-2 px-6 py-3 font-semibold text-sm transition-all border-b-2 ${activeTab === t.id
                                                    ? 'border-accent text-accent bg-accent/5'
                                                    : 'border-transparent text-gray-500 hover:text-gray-300 hover:bg-surface1'
                                                }`}
                                        >
                                            {t.icon} {t.label}
                                        </button>
                                    ))}
                                </div>

                                {/* TAB CONTENT */}
                                <div className="flex-grow py-6 flex flex-col min-h-0">
                                    {activeTab === 'role' && <RoleMode frappeFetch={frappeFetch} rolesCache={rolesCache} setRolesCache={setRolesCache} downloadCSV={downloadCSV} />}
                                    {activeTab === 'user' && <UserMode frappeFetch={frappeFetch} usersCache={usersCache} setUsersCache={setUsersCache} rolesCache={rolesCache} setRolesCache={setRolesCache} downloadCSV={downloadCSV} />}
                                    {activeTab === 'audit' && <AuditMode frappeFetch={frappeFetch} usersCache={usersCache} setUsersCache={setUsersCache} rolesCache={rolesCache} setRolesCache={setRolesCache} downloadCSV={downloadCSV} />}
                                    {activeTab === 'compare' && <CompareMode frappeFetch={frappeFetch} usersCache={usersCache} setUsersCache={setUsersCache} rolesCache={rolesCache} setRolesCache={setRolesCache} />}
                                    {activeTab === 'reverse' && <ReverseMode frappeFetch={frappeFetch} rolesCache={rolesCache} setRolesCache={setRolesCache} usersCache={usersCache} setUsersCache={setUsersCache} downloadCSV={downloadCSV} />}
                                    {activeTab === 'manage' && <ManageMode frappeFetch={frappeFetch} usersCache={usersCache} setUsersCache={setUsersCache} rolesCache={rolesCache} setRolesCache={setRolesCache} />}
                                    {activeTab === 'timeline' && <TimelineMode frappeFetch={frappeFetch} usersCache={usersCache} setUsersCache={setUsersCache} />}
                                    {activeTab === 'report' && <ReportMode frappeFetch={frappeFetch} rolesCache={rolesCache} setRolesCache={setRolesCache} usersCache={usersCache} setUsersCache={setUsersCache} downloadCSV={downloadCSV} />}
                                    {activeTab === 'doctype' && <DocTypeMode frappeFetch={frappeFetch} docTypesCache={docTypesCache} setDocTypesCache={setDocTypesCache} usersCache={usersCache} setUsersCache={setUsersCache} />}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="border-t border-border bg-surface shrink-0">
                        <div className="container mx-auto px-4 py-3 flex justify-between items-center text-xs text-gray-500 font-mono">
                            <div>Frappe Permission Auditor v1.0</div>
                            <div className="text-accent/50">Grupo ATU Internal Tools</div>
                        </div>
                    </footer>
                </div>
            );
        };

        // --- COMMON COMPONENTS ---

        const PermBadge = ({ val, detail }) => {
            if (val === 1 || val === true) {
                return (
                    <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-permGreen/10 text-permGreen border border-permGreen/30 relative group" title={detail}>
                        <IconCheck />
                    </div>
                );
            }
            return (
                <div className="inline-flex items-center justify-center w-6 h-6 rounded bg-surface1 text-gray-600 border border-border" title={detail || 'No access'}>
                    <span className="block w-2 h-[2px] bg-gray-600 rounded"></span>
                </div>
            );
        };

        // --- TAB 1: MODO ROL ---
        const RoleMode = ({ frappeFetch, rolesCache, setRolesCache, downloadCSV }) => {
            const [selectedRole, setSelectedRole] = useState('');
            const [rolePerms, setRolePerms] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (rolesCache.length === 0) {
                    frappeFetch('/api/resource/Role?limit_page_length=500&fields=["name"]')
                        .then(data => {
                            if (data && data.data) {
                                setRolesCache(data.data.map(d => d.name).sort());
                            }
                        }).catch(e => console.error(e));
                }
            }, []);

            const handleAudit = async () => {
                if (!selectedRole) return;
                setLoading(true);
                try {
                    const data = await frappeFetch(`/api/resource/DocPerm?filters=[["role","=","${selectedRole}"]]&fields=["parent","read","write","create","delete","submit","cancel","amend","report","export","import","share","print","email"]&limit_page_length=1000`);
                    if (data && data.data) {
                        setRolePerms(data.data.sort((a, b) => a.parent.localeCompare(b.parent)));
                    }
                } catch (e) { }
                setLoading(false);
            };

            const handleReset = () => {
                setSelectedRole('');
                setRolePerms([]);
                setSearch('');
            };

            const filteredPerms = useMemo(() => {
                return rolePerms.filter(p => p.parent.toLowerCase().includes(search.toLowerCase()));
            }, [rolePerms, search]);

            return (
                <div className="h-full flex flex-col gap-4 min-h-0">
                    <div className="flex gap-4 items-center bg-surface1 p-4 rounded-lg border border-border shrink-0">
                        <select
                            className="bg-surface2 border border-border text-gray-200 text-sm rounded px-3 py-2 w-64 focus:border-accent outline-none"
                            value={selectedRole} onChange={e => setSelectedRole(e.target.value)}
                        >
                            <option value="">-- Select Role --</option>
                            {rolesCache.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                        <button onClick={handleAudit} disabled={!selectedRole || loading} className="bg-accent text-surface font-bold px-4 py-2 rounded text-sm hover:bg-accent/80 transition-colors disabled:opacity-50">
                            Auditar Rol
                        </button>
                        <button onClick={handleReset} className="text-gray-500 hover:text-gray-300 text-sm ml-auto border border-border px-3 py-1.5 rounded">
                            Reset
                        </button>
                    </div>

                    {rolePerms.length > 0 && (
                        <div className="flex flex-col min-h-0 flex-grow border border-border rounded-lg bg-surface1 overflow-hidden">
                            <div className="p-3 border-b border-border bg-surface flex justify-between items-center shrink-0">
                                <div className="flex items-center gap-4">
                                    <div className="font-mono text-sm text-accent">Found {filteredPerms.length} DocTypes with access</div>
                                    <button onClick={() => downloadCSV(rolePerms, `auditoria_rol_${selectedRole}`)} className="bg-surface2 border border-border text-gray-400 hover:text-white px-3 py-1 rounded text-[10px] font-bold transition-all flex items-center gap-1">
                                        <IconDownload className="w-3 h-3" /> EXPORTAR CSV
                                    </button>
                                </div>
                                <input type="text" placeholder="Filter DocTypes..."
                                    className="bg-surface2 border border-border text-sm rounded px-3 py-1.5 focus:border-accent outline-none w-64 text-gray-200"
                                    value={search} onChange={e => setSearch(e.target.value)} />
                            </div>

                            <div className="flex-grow overflow-auto">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead className="sticky top-0 bg-surface2 z-10 shadow-md">
                                        <tr>
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border">DocType (Parent)</th>
                                            {PERMISSIONS.map(p => (
                                                <th key={p} className="p-2 font-mono text-xs text-gray-500 border-b border-border text-center writing-mode-vertical">
                                                    {p}
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="font-mono">
                                        {filteredPerms.map((row, idx) => (
                                            <tr key={idx} className="border-b border-border/50 hover:bg-surface2 transition-colors even:bg-surface/50">
                                                <td className="p-3 text-gray-200 whitespace-nowrap">{row.parent}</td>
                                                {PERMISSIONS.map(p => (
                                                    <td key={p} className="p-2 text-center">
                                                        <PermBadge val={row[p]} />
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                        {filteredPerms.length === 0 && (
                                            <tr><td colSpan={PERMISSIONS.length + 1} className="p-8 text-center text-gray-500">No DocTypes match the filter.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TAB 2: MODO USUARIO ---
        const UserMode = ({ frappeFetch, usersCache, setUsersCache, rolesCache, setRolesCache, downloadCSV }) => {
            const [selectedUser, setSelectedUser] = useState('');
            const [userRoles, setUserRoles] = useState([]);
            const [aggregatedPerms, setAggregatedPerms] = useState({});
            const [isSuperAdmin, setIsSuperAdmin] = useState(false);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (usersCache.length === 0) {
                    frappeFetch('/api/resource/User?fields=["name","full_name"]&filters=[["enabled","=",1]]&limit_page_length=1000')
                        .then(data => {
                            if (data && data.data) {
                                setUsersCache(data.data.sort((a, b) => a.name.localeCompare(b.name)));
                            }
                        }).catch(e => console.error(e));
                }
            }, []);

            const handleAnalyze = async () => {
                if (!selectedUser) return;
                setLoading(true);
                setIsSuperAdmin(false);
                setAggregatedPerms({});
                try {
                    // Get user roles
                    const userDoc = await frappeFetch(`/api/resource/User/${selectedUser}`);
                    if (userDoc && userDoc.data) {
                        const roles = (userDoc.data.roles || []).map(r => r.role);
                        setUserRoles(roles);

                        if (roles.includes("System Manager")) {
                            setIsSuperAdmin(true);
                            setLoading(false);
                            return; // Don't fetch perms for super admin, visual flag is enough or we could fetch all.
                        }

                        if (roles.length > 0) {
                            // Frappe API REST filters can be tricky with IN for large lists. Better to make separate calls or one IN call if supported.
                            const rolesJson = JSON.stringify(roles);
                            const permData = await frappeFetch(`/api/resource/DocPerm?filters=[["role","in",${rolesJson}]]&fields=["parent","role","read","write","create","delete","submit","cancel","amend","report","export","import","share","print","email"]&limit_page_length=5000`);

                            if (permData && permData.data) {
                                // Aggregate
                                const agg = {};
                                permData.data.forEach(p => {
                                    if (!agg[p.parent]) {
                                        agg[p.parent] = { parent: p.parent, viaRoles: new Set() };
                                        PERMISSIONS.forEach(perm => agg[p.parent][perm] = { val: 0, by: [] });
                                    }

                                    PERMISSIONS.forEach(perm => {
                                        if (p[perm] === 1) {
                                            agg[p.parent][perm].val = 1;
                                            agg[p.parent][perm].by.push(p.role);
                                        }
                                    });
                                    agg[p.parent].viaRoles.add(p.role);
                                });
                                setAggregatedPerms(agg);
                            }
                        }
                    }
                } catch (e) { }
                setLoading(false);
            };

            const handleReset = () => {
                setSelectedUser('');
                setUserRoles([]);
                setAggregatedPerms({});
                setIsSuperAdmin(false);
                setSearch('');
            };

            const sortedAggPerms = useMemo(() => {
                let arr = Object.values(aggregatedPerms);
                if (search) {
                    arr = arr.filter(p => p.parent.toLowerCase().includes(search.toLowerCase()));
                }
                return arr.sort((a, b) => a.parent.localeCompare(b.parent));
            }, [aggregatedPerms, search]);

            return (
                <div className="h-full flex flex-col gap-4 min-h-0">
                    <div className="flex gap-4 items-center bg-surface1 p-4 rounded-lg border border-border shrink-0">
                        <select
                            className="bg-surface2 border border-border text-gray-200 text-sm rounded px-3 py-2 w-80 focus:border-accent outline-none font-mono"
                            value={selectedUser} onChange={e => setSelectedUser(e.target.value)}
                        >
                            <option value="">-- Select User --</option>
                            {usersCache.map(u => <option key={u.name} value={u.name}>{u.name} {u.full_name ? `(${u.full_name})` : ''}</option>)}
                        </select>
                        <button onClick={handleAnalyze} disabled={!selectedUser || loading} className="bg-accentSec text-surface font-bold px-4 py-2 rounded text-sm hover:bg-accentSec/80 transition-colors disabled:opacity-50">
                            Analizar Usuario
                        </button>
                        <button onClick={handleReset} className="text-gray-500 hover:text-gray-300 text-sm ml-auto border border-border px-3 py-1.5 rounded">
                            Reset
                        </button>
                    </div>

                    {isSuperAdmin && (
                        <div className="bg-permAmber/10 border-2 border-permAmber text-permAmber p-6 rounded-lg flex items-center gap-4 shrink-0 shadow-[0_0_20px_rgba(255,184,0,0.1)]">
                            <IconAlertCircle className="w-10 h-10" />
                            <div>
                                <h3 className="text-xl font-bold font-mono tracking-tight">⚠ SUPERADMIN</h3>
                                <p className="text-permAmber/80">This user has the "System Manager" role. They effectively have total permissions across the system, bypassing granular DocPerms.</p>
                            </div>
                        </div>
                    )}

                    {!isSuperAdmin && userRoles.length > 0 && (
                        <div className="flex flex-col min-h-0 flex-grow border border-border rounded-lg bg-surface1 overflow-hidden">
                            <div className="p-3 border-b border-border bg-surface flex flex-wrap gap-4 items-center shrink-0">
                                <div className="font-mono text-sm text-accentSec flex-grow">
                                    <div className="flex items-center gap-4">
                                        <span className="text-gray-400">User Roles:</span>
                                        <button onClick={() => downloadCSV(sortedAggPerms, `auditoria_usuario_${selectedUser}`)} className="bg-surface2 border border-border text-gray-500 hover:text-white px-3 py-1 rounded text-[10px] font-bold transition-all flex items-center gap-1">
                                            <IconDownload className="w-3 h-3" /> EXPORTAR PERMISOS
                                        </button>
                                    </div>
                                    <div className="flex flex-wrap gap-2 mt-2">
                                        {userRoles.map(r => (
                                            <span key={r} className="bg-surface2 border border-border px-2 py-1 rounded text-xs text-gray-300">{r}</span>
                                        ))}
                                    </div>
                                </div>
                                <div className="self-end pb-1">
                                    <input type="text" placeholder="Filter DocTypes..."
                                        className="bg-surface2 border border-border text-sm rounded px-3 py-1.5 focus:border-accentSec outline-none w-64 text-gray-200"
                                        value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                            </div>

                            <div className="flex-grow overflow-auto">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead className="sticky top-0 bg-surface2 z-10 shadow-md">
                                        <tr>
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border">DocType</th>
                                            {PERMISSIONS.map(p => (
                                                <th key={p} className="p-2 font-mono text-xs text-gray-500 border-b border-border text-center">
                                                    {p.substring(0, 3)}
                                                </th>
                                            ))}
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border text-right">Vía Roles</th>
                                        </tr>
                                    </thead>
                                    <tbody className="font-mono text-xs">
                                        {sortedAggPerms.map((row, idx) => (
                                            <tr key={idx} className="border-b border-border/50 hover:bg-surface2 transition-colors even:bg-surface/50">
                                                <td className="p-3 text-gray-200 whitespace-nowrap text-sm font-sans">{row.parent}</td>
                                                {PERMISSIONS.map(p => (
                                                    <td key={p} className="p-2 text-center">
                                                        <PermBadge val={row[p].val} detail={row[p].val ? `Granted by: ${row[p].by.join(', ')}` : ''} />
                                                    </td>
                                                ))}
                                                <td className="p-3 text-gray-500 text-right max-w-[200px] truncate" title={Array.from(row.viaRoles).join(', ')}>
                                                    {Array.from(row.viaRoles).join(', ')}
                                                </td>
                                            </tr>
                                        ))}
                                        {sortedAggPerms.length === 0 && (
                                            <tr><td colSpan={PERMISSIONS.length + 2} className="p-8 text-center text-gray-500">No effective permissions found or check filter.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TAB 3: MODO DOCTYPE ---
        const DocTypeMode = ({ frappeFetch, docTypesCache, setDocTypesCache, usersCache }) => {
            const [selectedDocType, setSelectedDocType] = useState('');
            const [dtPerms, setDtPerms] = useState([]);
            const [loading, setLoading] = useState(false);

            // Simulation
            const [simUser, setSimUser] = useState('');
            const [simAction, setSimAction] = useState('read');
            const [simResult, setSimResult] = useState(null);

            useEffect(() => {
                if (docTypesCache.length === 0) {
                    frappeFetch('/api/resource/DocType?fields=["name","module"]&limit_page_length=2000')
                        .then(data => {
                            if (data && data.data) {
                                // Group by module
                                const grouped = {};
                                data.data.forEach(d => {
                                    if (!grouped[d.module]) grouped[d.module] = [];
                                    grouped[d.module].push(d.name);
                                });
                                // Sort modules and items
                                const sortedModules = Object.keys(grouped).sort();
                                const structured = sortedModules.map(m => ({
                                    module: m,
                                    types: grouped[m].sort()
                                }));
                                setDocTypesCache(structured);
                            }
                        }).catch(e => console.error(e));
                }
            }, []);

            const handleInspect = async () => {
                if (!selectedDocType) return;
                setLoading(true);
                setSimResult(null);
                try {
                    const data = await frappeFetch(`/api/resource/DocPerm?filters=[["parent","=","${selectedDocType}"]]&fields=["role","read","write","create","delete","submit","cancel","amend","report","export"]&limit_page_length=500`);
                    if (data && data.data) {
                        setDtPerms(data.data.sort((a, b) => a.role.localeCompare(b.role)));
                    } else {
                        setDtPerms([]);
                    }
                } catch (e) { }
                setLoading(false);
            };

            const handleReset = () => {
                setSelectedDocType('');
                setDtPerms([]);
                setSimResult(null);
                setSimUser('');
            };

            const handleSimulate = async () => {
                if (!selectedDocType || !simUser || !simAction) return;
                setLoading(true);
                try {
                    const userDoc = await frappeFetch(`/api/resource/User/${simUser}`);
                    if (userDoc && userDoc.data) {
                        const roles = (userDoc.data.roles || []).map(r => r.role);

                        if (roles.includes("System Manager")) {
                            setSimResult({
                                allowed: true,
                                reason: 'System Manager (Superadmin)'
                            });
                            setLoading(false);
                            return;
                        }

                        // Check intersection of user roles and doctype roles that grant the action
                        const grantingRolesForAction = dtPerms.filter(p => p[simAction] && p[simAction] === 1).map(p => p.role);
                        const intersection = roles.filter(r => grantingRolesForAction.includes(r));

                        if (intersection.length > 0) {
                            setSimResult({
                                allowed: true,
                                reason: `Vía rol(es): ${intersection.join(', ')}`
                            });
                        } else {
                            setSimResult({
                                allowed: false,
                                reason: `Ningún rol asignado otorga este permiso. Roles del usuario: ${roles.length ? roles.join(', ') : 'Ninguno'}. Roles que otorgan permiso: ${grantingRolesForAction.length ? grantingRolesForAction.join(', ') : 'Ninguno'}.`
                            });
                        }
                    }
                } catch (e) {
                    console.error("Simulation failed", e);
                }
                setLoading(false);
            };

            const MAIN_PERMS = ["read", "write", "create", "delete", "submit", "cancel", "amend", "report", "export"];

            return (
                <div className="h-full flex flex-col gap-4 min-h-0">
                    <div className="flex gap-4 items-center bg-surface1 p-4 rounded-lg border border-border shrink-0">
                        <select
                            className="bg-surface2 border border-border text-gray-200 text-sm rounded px-3 py-2 w-80 focus:border-accent outline-none font-mono"
                            value={selectedDocType} onChange={e => setSelectedDocType(e.target.value)}
                        >
                            <option value="">-- Select DocType --</option>
                            {docTypesCache.map(g => (
                                <optgroup key={g.module} label={g.module}>
                                    {g.types.map(t => <option key={t} value={t}>{t}</option>)}
                                </optgroup>
                            ))}
                        </select>
                        <button onClick={handleInspect} disabled={!selectedDocType || loading} className="bg-permGreen/20 text-permGreen border border-permGreen/50 font-bold px-4 py-2 rounded text-sm hover:bg-permGreen/30 transition-colors disabled:opacity-50">
                            Inspeccionar
                        </button>
                        <button onClick={handleReset} className="text-gray-500 hover:text-gray-300 text-sm ml-auto border border-border px-3 py-1.5 rounded">
                            Reset
                        </button>
                    </div>

                    {dtPerms.length > 0 && (
                        <div className="flex flex-col min-h-0 flex-grow gap-4">
                            {/* TABLE */}
                            <div className="flex flex-col min-h-[50%] flex-grow border border-border rounded-lg bg-surface1 overflow-hidden">
                                <div className="p-3 border-b border-border bg-surface shrink-0">
                                    <div className="font-mono text-sm text-permGreen">Roles with access to {selectedDocType}</div>
                                </div>
                                <div className="flex-grow overflow-auto">
                                    <table className="w-full text-left border-collapse text-sm">
                                        <thead className="sticky top-0 bg-surface2 z-10 shadow-md">
                                            <tr>
                                                <th className="p-3 font-semibold text-gray-400 border-b border-border">Role</th>
                                                {MAIN_PERMS.map(p => (
                                                    <th key={p} className="p-2 font-mono text-xs text-gray-500 border-b border-border text-center">
                                                        {p.substring(0, 3)}
                                                    </th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="font-mono text-xs">
                                            {dtPerms.map((row, idx) => (
                                                <tr key={idx} className="border-b border-border/50 hover:bg-surface2 transition-colors even:bg-surface/50">
                                                    <td className="p-3 text-gray-200 whitespace-nowrap text-sm font-sans">{row.role}</td>
                                                    {MAIN_PERMS.map(p => (
                                                        <td key={p} className="p-2 text-center">
                                                            <PermBadge val={row[p]} />
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                            {dtPerms.length === 0 && (
                                                <tr><td colSpan={MAIN_PERMS.length + 1} className="p-8 text-center text-gray-500">No explicit Role permissions found.</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* SIMULATOR */}
                            <div className="bg-surface2 border border-border rounded-lg p-5 shrink-0 flex flex-col gap-4">
                                <h3 className="text-lg font-bold text-gray-300 font-mono tracking-tight border-b border-border/50 pb-2">SIMULATE</h3>
                                <div className="flex flex-wrap items-center gap-4">
                                    <select
                                        className="bg-surface1 border border-border text-gray-200 text-sm rounded px-3 py-2 w-64 focus:border-accent outline-none font-mono"
                                        value={simUser} onChange={e => setSimUser(e.target.value)}
                                    >
                                        <option value="">-- Select User --</option>
                                        {usersCache.map(u => <option key={u.name} value={u.name}>{u.name}</option>)}
                                    </select>

                                    <select
                                        className="bg-surface1 border border-border text-gray-200 text-sm rounded px-3 py-2 w-48 focus:border-accent outline-none font-mono uppercase"
                                        value={simAction} onChange={e => setSimAction(e.target.value)}
                                    >
                                        {MAIN_PERMS.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>

                                    <button onClick={handleSimulate} disabled={!simUser || !simAction || loading} className="bg-accent/10 border border-accent/50 text-accent font-bold px-4 py-2 rounded text-sm hover:bg-accent/20 transition-colors disabled:opacity-50">
                                        ¿Puede hacerlo?
                                    </button>
                                </div>

                                {simResult && (
                                    <div className={`mt-2 p-4 rounded-lg flex items-start gap-4 ${simResult.allowed
                                            ? 'bg-permGreen/10 border border-permGreen/50 text-permGreen shadow-[0_0_15px_rgba(0,255,157,0.1)]'
                                            : 'bg-permRed/10 border border-permRed/50 text-permRed shadow-[0_0_15px_rgba(255,77,106,0.1)]'
                                        }`}>
                                        <div className="mt-1">
                                            {simResult.allowed ? <IconCheck /> : <IconX />}
                                        </div>
                                        <div>
                                            <h4 className="text-lg font-bold font-mono tracking-tight">
                                                {simResult.allowed ? 'SÍ PUEDE' : 'NO PUEDE'}
                                            </h4>
                                            <p className="opacity-80 text-sm mt-1">{simResult.reason}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TAB 4: MATRIZ INVERSA (Usuarios por Rol) ---
        const ReverseMode = ({ frappeFetch, rolesCache, setRolesCache, usersCache, setUsersCache, downloadCSV }) => {
            const [selectedRole, setSelectedRole] = useState('');
            const [usersInRole, setUsersInRole] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (rolesCache.length === 0) {
                    frappeFetch('/api/resource/Role?limit_page_length=500&fields=["name"]')
                        .then(data => {
                            if (data && data.data) {
                                setRolesCache(data.data.map(d => d.name).sort());
                            }
                        }).catch(e => console.error(e));
                }
                if (usersCache.length === 0) {
                    frappeFetch('/api/resource/User?fields=["name","full_name","enabled"]&limit_page_length=2000')
                        .then(data => {
                            if (data && data.data) {
                                setUsersCache(data.data);
                            }
                        }).catch(e => console.error(e));
                }
            }, []);

            const handleAnalyze = async () => {
                if (!selectedRole) return;
                setLoading(true);
                try {
                    const data = await frappeFetch(`/api/resource/Has Role?filters=[["role","=","${selectedRole}"]]&fields=["parent"]&limit_page_length=1000`);
                    if (data && data.data) {
                        // parent is the User ID (email)
                        const userIds = data.data.map(d => d.parent);
                        const detailedUsers = userIds.map(id => {
                            const cached = usersCache.find(u => u.name === id);
                            return cached || { name: id, full_name: 'Unknown', enabled: 1 };
                        });
                        setUsersInRole(detailedUsers.sort((a,b) => a.name.localeCompare(b.name)));
                    } else {
                        setUsersInRole([]);
                    }
                } catch (e) { }
                setLoading(false);
            };

            const handleReset = () => {
                setSelectedRole('');
                setUsersInRole([]);
                setSearch('');
            };

            const filteredUsers = useMemo(() => {
                return usersInRole.filter(u => 
                    u.name.toLowerCase().includes(search.toLowerCase()) || 
                    (u.full_name && u.full_name.toLowerCase().includes(search.toLowerCase()))
                );
            }, [usersInRole, search]);

            return (
                <div className="h-full flex flex-col gap-4 min-h-0">
                    <div className="flex gap-4 items-center bg-surface1 p-4 rounded-lg border border-border shrink-0">
                        <select 
                            className="bg-surface2 border border-border text-gray-200 text-sm rounded px-3 py-2 w-64 focus:border-accent outline-none font-mono"
                            value={selectedRole} onChange={e => setSelectedRole(e.target.value)}
                        >
                            <option value="">-- Select Role --</option>
                            {rolesCache.map(r => <option key={r} value={r}>{r}</option>)}
                        </select>
                        <button onClick={handleAnalyze} disabled={!selectedRole || loading} className="bg-accent/10 hover:bg-accent/20 text-accent border border-accent/50 font-bold px-4 py-2 rounded text-sm transition-all disabled:opacity-50">
                            {loading ? 'Cargando...' : 'Listar Usuarios'}
                        </button>
                        <button onClick={handleReset} className="text-gray-500 hover:text-gray-300 text-sm ml-auto border border-border px-3 py-1.5 rounded">
                            Reset
                        </button>
                    </div>

                    {usersInRole.length > 0 && (
                        <div className="flex flex-col min-h-0 flex-grow border border-border rounded-lg bg-surface1 overflow-hidden">
                            <div className="p-3 border-b border-border bg-surface flex justify-between items-center shrink-0">
                                <div className="flex items-center gap-4">
                                    <div className="font-mono text-sm text-accent">Found {filteredUsers.length} users with this role</div>
                                    <button onClick={() => downloadCSV(filteredUsers, `usuarios_rol_${selectedRole}`)} className="bg-surface2 border border-border text-gray-400 hover:text-white px-3 py-1 rounded text-[10px] font-bold transition-all flex items-center gap-1">
                                        <IconDownload className="w-3 h-3" /> EXPORTAR LISTA
                                    </button>
                                </div>
                                <input type="text" placeholder="Filter users..." 
                                    className="bg-surface2 border border-border text-sm rounded px-3 py-1.5 focus:border-accent outline-none w-64 text-gray-200"
                                    value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            
                            <div className="flex-grow overflow-auto">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead className="sticky top-0 bg-surface2 z-10 shadow-md">
                                        <tr>
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border">ID (Email)</th>
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border">Full Name</th>
                                            <th className="p-3 font-semibold text-gray-400 border-b border-border text-center">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="font-mono text-xs text-gray-300">
                                        {filteredUsers.map((u, idx) => (
                                            <tr key={idx} className="border-b border-border/50 hover:bg-surface2 transition-colors even:bg-surface/50">
                                                <td className="p-3 text-accent font-semibold">{u.name}</td>
                                                <td className="p-3 font-sans text-sm">{u.full_name}</td>
                                                <td className="p-3 text-center">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] uppercase font-bold ${u.enabled ? 'bg-permGreen/10 text-permGreen' : 'bg-permRed/10 text-permRed'}`}>
                                                        {u.enabled ? 'Enabled' : 'Disabled'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- TAB 5: GESTIÓN DE ROLES (Asignar Roles - Single & Bulk) ---
        const ManageMode = ({ frappeFetch, usersCache, setUsersCache, rolesCache, setRolesCache }) => {
            const [isBulkMode, setIsBulkMode] = useState(false);
            const [selectedUser, setSelectedUser] = useState(''); // Single mode
            const [selectedUsers, setSelectedUsers] = useState([]); // Bulk mode
            const [userRoles, setUserRoles] = useState([]); // Roles for single user view
            const [roleToAdd, setRoleToAdd] = useState('');
            const [userSearch, setUserSearch] = useState('');
            const [loading, setLoading] = useState(false);
            const [bulkLoading, setBulkLoading] = useState(false);
            const [bulkProgress, setBulkProgress] = useState(0);
            const [bulkTotal, setBulkTotal] = useState(0);
            const [message, setMessage] = useState(null);

            useEffect(() => {
                if (rolesCache.length === 0) {
                    frappeFetch('/api/resource/Role?limit_page_length=500&fields=["name"]')
                        .then(data => {
                            if (data && data.data) setRolesCache(data.data.map(d => d.name).sort());
                        }).catch(e => console.error(e));
                }
                if (usersCache.length === 0) {
                    frappeFetch('/api/resource/User?fields=["name","full_name"]&filters=[["enabled","=",1]]&limit_page_length=2000')
                        .then(data => {
                            if (data && data.data) setUsersCache(data.data.sort((a, b) => a.name.localeCompare(b.name)));
                        }).catch(e => console.error(e));
                }
            }, []);

            const fetchUserRoles = async (userId) => {
                if (!userId) return;
                setLoading(true);
                try {
                    const data = await frappeFetch(`/api/resource/User/${userId}`);
                    if (data && data.data) setUserRoles((data.data.roles || []).map(r => r.role));
                } catch (e) { }
                setLoading(false);
            };

            useEffect(() => {
                if (!isBulkMode && selectedUser) {
                    fetchUserRoles(selectedUser);
                    setMessage(null);
                } else if (!isBulkMode) {
                    setUserRoles([]);
                }
            }, [selectedUser, isBulkMode]);

            // --- Single Mode Handlers ---
            const handleSingleAddRole = async () => {
                if (!selectedUser || !roleToAdd) return;
                if (userRoles.includes(roleToAdd)) {
                    setMessage({ type: 'error', text: 'El usuario ya tiene asignado este rol.' });
                    return;
                }
                setLoading(true);
                try {
                    const newRoles = [...userRoles, roleToAdd].map(r => ({ role: r }));
                    await frappeFetch(`/api/resource/User/${selectedUser}`, {
                        method: 'PUT',
                        body: JSON.stringify({ roles: newRoles })
                    });
                    setMessage({ type: 'success', text: `Rol "${roleToAdd}" asignado a ${selectedUser}.` });
                    setRoleToAdd('');
                    fetchUserRoles(selectedUser);
                } catch (e) {
                    setMessage({ type: 'error', text: `Error: ${e.message}` });
                }
                setLoading(false);
            };

            const handleSingleRemoveRole = async (roleToRemove) => {
                if (!selectedUser || !confirm(`¿Quitar rol "${roleToRemove}"?`)) return;
                setLoading(true);
                try {
                    const newRoles = userRoles.filter(r => r !== roleToRemove).map(r => ({ role: r }));
                    await frappeFetch(`/api/resource/User/${selectedUser}`, {
                        method: 'PUT',
                        body: JSON.stringify({ roles: newRoles })
                    });
                    setMessage({ type: 'success', text: `Rol "${roleToRemove}" eliminado.` });
                    fetchUserRoles(selectedUser);
                } catch (e) {
                    setMessage({ type: 'error', text: `Error: ${e.message}` });
                }
                setLoading(false);
            };

            // --- Bulk Mode Handlers ---
            const toggleUserSelection = (userId) => {
                setSelectedUsers(prev => prev.includes(userId) ? prev.filter(u => u !== userId) : [...prev, userId]);
            };

            const selectAllFiltered = () => {
                const filtered = usersCache.filter(u => 
                    u.name.toLowerCase().includes(userSearch.toLowerCase()) || 
                    (u.full_name && u.full_name.toLowerCase().includes(userSearch.toLowerCase()))
                );
                setSelectedUsers(filtered.map(u => u.name));
            };

            const handleBulkAction = async (actionType) => {
                if (selectedUsers.length === 0 || !roleToAdd) return;
                const verb = actionType === 'add' ? 'asignar' : 'quitar';
                if (!confirm(`¿Estás seguro de que quieres ${verb} el rol "${roleToAdd}" a ${selectedUsers.length} usuarios?`)) return;

                setBulkLoading(true);
                setBulkTotal(selectedUsers.length);
                setBulkProgress(0);
                let successCount = 0;
                let errorCount = 0;

                for (const userId of selectedUsers) {
                    try {
                        // 1. Fetch current roles
                        const res = await frappeFetch(`/api/resource/User/${userId}`);
                        let currentRoles = (res.data.roles || []).map(r => r.role);
                        
                        let newRoles;
                        if (actionType === 'add') {
                            if (!currentRoles.includes(roleToAdd)) {
                                newRoles = [...currentRoles, roleToAdd].map(r => ({ role: r }));
                            } else {
                                newRoles = null; // No change needed
                            }
                        } else {
                            if (currentRoles.includes(roleToAdd)) {
                                newRoles = currentRoles.filter(r => r !== roleToAdd).map(r => ({ role: r }));
                            } else {
                                newRoles = null; // No change needed
                            }
                        }

                        // 2. Update if changed
                        if (newRoles) {
                            await frappeFetch(`/api/resource/User/${userId}`, {
                                method: 'PUT',
                                body: JSON.stringify({ roles: newRoles })
                            });
                        }
                        successCount++;
                    } catch (e) {
                        console.error(`Error bulk ${userId}:`, e);
                        errorCount++;
                    }
                    setBulkProgress(prev => prev + 1);
                }

                setMessage({ 
                    type: errorCount === 0 ? 'success' : 'error', 
                    text: `Acción finalizada: ${successCount} éxitos, ${errorCount} errores.` 
                });
                setBulkLoading(false);
                setSelectedUsers([]);
                setRoleToAdd('');
            };

            const filteredUsers = usersCache.filter(u => 
                u.name.toLowerCase().includes(userSearch.toLowerCase()) || 
                (u.full_name && u.full_name.toLowerCase().includes(userSearch.toLowerCase()))
            );

            return (
                <div className="h-full flex flex-col gap-6 max-w-5xl mx-auto w-full min-h-0">
                    {/* Bulk Progress Overlay */}
                    {bulkLoading && (
                        <div className="fixed inset-0 bg-base/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-surface1 border border-accent/50 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center space-y-4">
                                <div className="text-accent text-3xl font-bold font-mono animate-pulse">PROCESANDO...</div>
                                <div className="h-2 w-full bg-surface2 rounded-full overflow-hidden border border-border">
                                    <div className="h-full bg-accent transition-all duration-300" style={{ width: `${(bulkProgress / bulkTotal) * 100}%` }}></div>
                                </div>
                                <div className="text-gray-400 font-mono text-sm leading-relaxed">
                                    Usuario {bulkProgress} de {bulkTotal}<br/>
                                    <span className="text-accent/60 text-xs">No cierres esta pestaña</span>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-surface1 p-6 rounded-xl border border-border shadow-xl space-y-6">
                        <div className="flex justify-between items-center bg-surface/50 p-1 rounded-lg border border-border w-fit self-center">
                            <button onClick={() => setIsBulkMode(false)} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${!isBulkMode ? 'bg-accent text-surface' : 'text-gray-500 hover:text-gray-300'}`}>MODO INDIVIDUAL</button>
                            <button onClick={() => setIsBulkMode(true)} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all ${isBulkMode ? 'bg-accentSec text-surface' : 'text-gray-500 hover:text-gray-300'}`}>MODO MASIVO (BETA)</button>
                        </div>

                        {!isBulkMode ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-2">
                                    <label className="text-xs text-gray-500 uppercase font-bold tracking-wider">Usuario</label>
                                    <select className="bg-surface2 border border-border text-gray-200 text-sm rounded-lg px-4 py-2.5 w-full focus:border-accent outline-none font-mono" value={selectedUser} onChange={e => setSelectedUser(e.target.value)}>
                                        <option value="">-- Escoger Usuario --</option>
                                        {usersCache.map(u => <option key={u.name} value={u.name}>{u.name} {u.full_name ? `(${u.full_name})` : ''}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-gray-500 uppercase font-bold tracking-wider">Añadir Nuevo Rol</label>
                                    <div className="flex gap-2">
                                        <select className="bg-surface2 border border-border text-gray-200 text-sm rounded-lg px-4 py-2.5 flex-grow focus:border-accent outline-none font-mono" value={roleToAdd} onChange={e => setRoleToAdd(e.target.value)} disabled={!selectedUser}>
                                            <option value="">-- Escoger Rol --</option>
                                            {rolesCache.map(r => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                        <button onClick={handleSingleAddRole} disabled={!selectedUser || !roleToAdd || loading} className="bg-accent text-surface font-bold px-4 py-2 rounded-lg hover:bg-accent/80 transition-all disabled:opacity-30">Asignar</button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="flex flex-wrap items-end gap-4 bg-surface/50 p-4 rounded-lg border border-border/50">
                                    <div className="flex-grow space-y-2">
                                        <label className="text-xs text-gray-500 uppercase font-bold tracking-wider">Rol a Gestionar</label>
                                        <select className="bg-surface2 border border-border text-accentSec text-sm rounded-lg px-4 py-2.5 w-full focus:border-accentSec outline-none font-bold" value={roleToAdd} onChange={e => setRoleToAdd(e.target.value)}>
                                            <option value="">-- Escoger Rol --</option>
                                            {rolesCache.map(r => <option key={r} value={r}>{r}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => handleBulkAction('add')} disabled={selectedUsers.length === 0 || !roleToAdd || bulkLoading} className="bg-accent text-surface font-bold px-4 py-2.5 rounded-lg hover:bg-accent/90 disabled:opacity-30">Asignar a {selectedUsers.length}</button>
                                        <button onClick={() => handleBulkAction('remove')} disabled={selectedUsers.length === 0 || !roleToAdd || bulkLoading} className="bg-permRed/20 text-permRed border border-permRed/40 font-bold px-4 py-2.5 rounded-lg hover:bg-permRed/30 disabled:opacity-30">Quitar de {selectedUsers.length}</button>
                                    </div>
                                </div>
                                
                                <div className="border border-border rounded-xl bg-surface2/50 overflow-hidden flex flex-col h-[400px]">
                                    <div className="p-3 bg-surface border-b border-border flex flex-wrap gap-4 items-center">
